name: PR Automation

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  pull_request_target:
    types: [opened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  auto-label:
    name: Auto Label PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request_target'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Label PR
        uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml

  size-label:
    name: Add Size Label
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Skip external size-label action
        run: echo "Size label automation skipped (external action unavailable)."

  conventional-commits:
    name: Validate Conventional Commits
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - name: Advisory conventional commit check
        run: |
          echo "Conventional commit title validation is advisory only in this repository."
          echo "PR title: ${{ github.event.pull_request.title }}"

  pr-welcome:
    name: Welcome First Time Contributors
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request_target' && github.event.action == 'opened'
    steps:
      - name: Welcome message
        uses: actions/first-interaction@34f15e814fe6a47a91c8e7c0dfc5e5c62fe3cb20 # v1.3.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pr-message: |
            👋 Thanks for opening your first pull request!

            Please make sure you've read our [contributing guidelines](https://github.com/${{ github.repository }}/blob/main/CONTRIBUTING.md).

            A maintainer will review your PR soon. In the meantime, please ensure:
            - [ ] All tests pass
            - [ ] Documentation is updated if needed
            - [ ] Commit messages follow conventional commits format

  link-checker:
    name: Check Links in PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check links
        uses: lycheeverse/lychee-action@2b973e86fc7b1f6b36a93795fe2c9c6ae1118621 # v1.10.0
        with:
          args: --verbose --no-progress '**/*.md' '**/*.html' --exclude-mail --exclude 'http://localhost:.*' --exclude 'http://127.0.0.1:.*'
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  comment-commands:
    name: Handle PR Commands
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: |
      github.event_name == 'pull_request' &&
      (contains(github.event.comment.body, '/retest') ||
       contains(github.event.comment.body, '/rebuild'))
    steps:
      - name: React to command
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });
