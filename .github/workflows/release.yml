name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  packages: write
  security-events: write
  id-token: write # For cosign
  attestations: write # For provenance

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1
  REGISTRY: ghcr.io

jobs:
  secrets-scan:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Pre-Release Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [secrets-scan]
    strategy:
      matrix:
        image:
          - ee-base
          - ee-builder
          - dev-tools
          - gateway
      fail-fast: true
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db # v3.6.1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install pytest pytest-cov

      - name: Run hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: ${{ matrix.image == 'pulp' && 'images/pulp/Dockerfile.pulp' || format('images/{0}/Dockerfile', matrix.image) }}
          failure-threshold: warning

      - name: Build base image
        uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85 # v6.7.0
        with:
          context: ./images/ee-base
          file: ./images/ee-base/Dockerfile
          tags: aax/ee-base:1.0.0
          cache-from: type=gha,scope=ee-base
          cache-to: type=gha,mode=max,scope=ee-base
          load: true
        if: matrix.image != 'ee-base'

      - name: Build ${{ matrix.image }} image
        run: |
          if [ "${{ matrix.image }}" = "ee-base" ]; then
            docker build \
              --build-arg VERSION=1.0.0 \
              --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
              --build-arg VCS_REF=${GITHUB_SHA} \
              -f ./images/ee-base/Dockerfile \
              -t aax/ee-base:1.0.0 \
              ./images/ee-base
          else
            docker build \
              --build-arg BASE_IMAGE=aax/ee-base:1.0.0 \
              --build-arg VERSION=1.0.0 \
              --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
              --build-arg VCS_REF=${GITHUB_SHA} \
              -f ./images/${{ matrix.image }}/Dockerfile \
              -t aax/${{ matrix.image }}:1.0.0 \
              ./images/${{ matrix.image }}
          fi

      - name: Run pytest tests
        run: |
          case "${{ matrix.image }}" in
            ee-base) test_class="TestEEBaseImage" ;;
            ee-builder) test_class="TestEEBuilderImage" ;;
            dev-tools) test_class="TestDevToolsImage" ;;
            gateway) test_class="TestGatewayImage" ;;
            *)
              echo "Unsupported image for test class mapping: ${{ matrix.image }}"
              exit 1
              ;;
          esac
          pytest "tests/test_images.py::${test_class}" -v

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test]
    strategy:
      matrix:
        image:
          - ee-base
          - dev-tools
          - ee-builder
          - gateway
      fail-fast: true
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db # v3.6.1

      - name: Build base image
        uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85 # v6.7.0
        with:
          context: ./images/ee-base
          file: ./images/ee-base/Dockerfile
          tags: aax/ee-base:1.0.0
          cache-from: type=gha,scope=ee-base
          load: true
        if: matrix.image != 'ee-base'

      - name: Build ${{ matrix.image }} image
        run: |
          if [ "${{ matrix.image }}" = "ee-base" ]; then
            docker build \
              --build-arg VERSION=1.0.0 \
              --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
              --build-arg VCS_REF=${GITHUB_SHA} \
              -f ./images/ee-base/Dockerfile \
              -t aax/ee-base:1.0.0 \
              ./images/ee-base
          else
            docker build \
              --build-arg BASE_IMAGE=aax/ee-base:1.0.0 \
              --build-arg VERSION=1.0.0 \
              --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
              --build-arg VCS_REF=${GITHUB_SHA} \
              -f ./images/${{ matrix.image }}/Dockerfile \
              -t aax/${{ matrix.image }}:1.0.0 \
              ./images/${{ matrix.image }}
          fi

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: aax/${{ matrix.image }}:1.0.0
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4.32.4
        if: always()
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}

  policy-checks:
    name: Policy and Docs Contract Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test, security-scan, secrets-scan]
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install policy test dependencies
        run: pip install pytest pytest-cov

      - name: Run repository policy and docs contract tests
        run: pytest -q tests/test_repo_policy.py tests/test_docs_contract.py

  release-please:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test, security-scan, policy-checks]
    permissions:
      contents: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}
    steps:
      - uses: googleapis/release-please-action@7987652d64b4581673a76e33ad5e98e3dd56832f # v4.1.3
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          release-type: simple
          target-branch: main
          skip-github-pull-request: true

  build-base-image:
    name: Build and Push Base Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Set up QEMU for multi-arch
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db # v3.6.1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate build metadata
        id: build-meta
        run: echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push ee-base multi-arch
        uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85 # v6.7.0
        with:
          context: ./images/ee-base
          file: ./images/ee-base/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ needs.release-please.outputs.version }}
            BUILD_DATE=${{ steps.build-meta.outputs.build_date }}
            VCS_REF=${{ github.sha }}
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/aax-ee-base:${{ needs.release-please.outputs.version }}
          cache-from: type=gha,scope=ee-base
          cache-to: type=gha,mode=max,scope=ee-base
          push: true

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [release-please, build-base-image]
    if: ${{ needs.release-please.outputs.release_created }}
    strategy:
      matrix:
        image:
          - ee-builder
          - dev-tools
          - gateway
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Set up QEMU for multi-arch
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db # v3.6.1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@8e5442c4ef9f78752691e2d8f8d19755c6f78e81 # v5.5.1
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/aax-${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.release-please.outputs.version }}

      - name: Build and push ${{ matrix.image }} multi-arch
        id: build-push
        uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85 # v6.7.0
        with:
          context: ./images/${{ matrix.image }}
          file: ./images/${{ matrix.image }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ needs.release-please.outputs.version }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ github.sha }}
            ${{ matrix.image != 'ee-base' && format('BASE_IMAGE={0}/{1}/aax-ee-base:{2}', env.REGISTRY, github.repository_owner, needs.release-please.outputs.version) || '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          sbom: true
          provenance: true

      - name: Sign image with Cosign
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/aax-${{ matrix.image }}@${{ steps.build-push.outputs.digest }}

      - name: Generate SBOM
        uses: anchore/sbom-action@d94f46e13c6c62f59525ac9a1e147a99dc0b9bf5 # v0.17.0
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/aax-${{ matrix.image }}:${{ needs.release-please.outputs.version }}
          format: spdx-json
          output-file: sbom-${{ matrix.image }}.spdx.json

      - name: Attest SBOM
        uses: actions/attest-sbom@f19ab44411e02574a74181c0824e8bb88b756f9f # v1.4.1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/aax-${{ matrix.image }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          sbom-path: sbom-${{ matrix.image }}.spdx.json
          push-to-registry: true

      - name: Create release artifact manifest
        run: |
          echo "Image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/aax-${{ matrix.image }}:${{ needs.release-please.outputs.version }}" >> release-manifest.txt
          echo "Digest: ${{ steps.build-push.outputs.digest }}" >> release-manifest.txt
          echo "Platforms: linux/amd64,linux/arm64" >> release-manifest.txt

      - name: Upload release artifact
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: ${{ matrix.image }}-manifest
          path: release-manifest.txt
          retention-days: 90
