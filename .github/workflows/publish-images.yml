name: Publish Images

on:
  push:
    branches:
      - main
    paths:
      - "images/**"
      - ".github/workflows/publish-images.yml"
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-ee-base:
    name: Build and Push ee-base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db # v3.6.1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE_PREFIX }}/aax-ee-base
          tags: |
            type=raw,value=latest
            type=raw,value=main
            type=sha,format=short

      - name: Build and push ee-base
        uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85 # v6.7.0
        with:
          context: ./images/ee-base
          file: ./images/ee-base/Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          build-args: |
            VERSION=latest
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha,scope=ee-base
          cache-to: type=gha,mode=max,scope=ee-base

  build-and-push:
    name: Build and Push ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    needs: [build-ee-base]
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: ee-builder
            context: ./images/ee-builder
            file: ./images/ee-builder/Dockerfile
            use_base: true
          - name: dev-tools
            context: ./images/dev-tools
            file: ./images/dev-tools/Dockerfile
            use_base: true
          - name: gateway
            context: ./images/gateway
            file: ./images/gateway/Dockerfile
            use_base: false
          - name: pulp
            context: ./images/pulp
            file: ./images/pulp/Dockerfile.pulp
            use_base: false
          - name: galaxy-ng
            context: ./images/galaxy-ng
            file: ./images/galaxy-ng/Dockerfile
            use_base: false
          - name: eda-controller
            context: ./images/eda-controller
            file: ./images/eda-controller/Dockerfile
            use_base: false
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db # v3.6.1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE_PREFIX }}/aax-${{ matrix.image.name }}
          tags: |
            type=raw,value=latest
            type=raw,value=main
            type=sha,format=short

      - name: Compute base image argument
        id: base
        run: |
          if [ "${{ matrix.image.use_base }}" = "true" ]; then
            echo "value=BASE_IMAGE=${{ env.IMAGE_PREFIX }}/aax-ee-base:latest" >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85 # v6.7.0
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.file }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          build-args: |
            VERSION=latest
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ github.sha }}
            ${{ steps.base.outputs.value }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
