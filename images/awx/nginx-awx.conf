# AWX nginx vhost — injected via bind-mount into /etc/nginx/conf.d/awx.conf
# The base image nginx.conf already includes /etc/nginx/conf.d/*.conf
# This config proxies all AWX traffic to the uWSGI worker on 127.0.0.1:8050

server {
    listen 8052 default_server;
    server_name _;

    root /var/lib/awx/public;
    keepalive_timeout 65;

    # Static assets
    location /static/ {
        alias /var/lib/awx/public/static/;
        expires max;
        add_header Cache-Control "public, immutable";
    }

    # Custom AWX error pages
    error_page 404 /custom_404.html;
    error_page 502 /custom_502.html;
    error_page 504 /custom_504.html;
    location = /custom_404.html { root /var/lib/awx/public; internal; }
    location = /custom_502.html { root /var/lib/awx/public; internal; }
    location = /custom_504.html { root /var/lib/awx/public; internal; }

    # Django app via uWSGI
    location / {
        uwsgi_read_timeout 120s;
        uwsgi_pass 127.0.0.1:8050;
        include /etc/nginx/uwsgi_params;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $http_host;
    }

    # WebSocket connections to daphne
    location /websocket {
        proxy_pass http://127.0.0.1:8051;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $http_host;
    }
}
