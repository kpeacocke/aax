map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 8080;
    listen [::]:8080;
    server_name _;
    resolver 127.0.0.11 ipv6=off valid=10s;
    client_max_body_size 0;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location /api/galaxy/ {
        set $galaxy_upstream http://galaxy-ng:8000;
        proxy_pass $galaxy_upstream;
    }

    location /pulp/api/ {
        set $pulp_api_upstream http://pulp-api:24817;
        proxy_pass $pulp_api_upstream;
    }

    location /pulp/content/ {
        set $pulp_content_upstream http://pulp-content:24816;
        proxy_pass $pulp_content_upstream;
    }

    location /eda/ {
        rewrite ^/eda/?(.*)$ /$1 break;
        set $eda_upstream http://eda-controller:5000;
        proxy_pass $eda_upstream;
    }

    location / {
        set $awx_upstream http://awx-web:8052;
        proxy_pass $awx_upstream;
    }
}
