name: aax
services:
  ee-base:
    image: ${AAX_IMAGE_PREFIX:-ghcr.io/kpeacocke}/aax-ee-base:${VERSION:-latest}
    pull_policy: always
    working_dir: /workspace
    volumes:
      - workspace:/workspace:rw
    environment:
      ANSIBLE_NOCOWS: "1"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - ansible
    healthcheck:
      test: ["CMD", "python3", "-c", "import ansible; import ansible_runner"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    command: ["sleep", "infinity"]

  ee-builder:
    image: ${AAX_IMAGE_PREFIX:-ghcr.io/kpeacocke}/aax-ee-builder:${VERSION:-latest}
    pull_policy: always
    depends_on:
      ee-base:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ee_definitions:/workspace:rw
      - ee_builds:/builds:rw
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      ANSIBLE_NOCOWS: "1"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - ansible
    healthcheck:
      test: ["CMD", "ansible-builder", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    command: ["sleep", "infinity"]

  dev-tools:
    image: ${AAX_IMAGE_PREFIX:-ghcr.io/kpeacocke}/aax-dev-tools:${VERSION:-latest}
    pull_policy: always
    depends_on:
      ee-base:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - dev_workspace:/workspace:rw
    environment:
      ANSIBLE_NOCOWS: "1"
      PAGER: ""
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - ansible
    healthcheck:
      test: ["CMD", "ansible-navigator", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    command: ["sleep", "infinity"]

  awx-postgres:
    image: postgres:15
    container_name: awx-postgres
    profiles:
      - controller
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-awx}
      POSTGRES_USER: ${POSTGRES_USER:-awx}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set (non-empty) in .env or environment}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
    volumes:
      - awx_postgres_data:/var/lib/postgresql/data
    networks:
      - awx-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  awx-redis:
    image: redis:7
    container_name: awx-redis
    command: redis-server --appendonly yes
    profiles:
      - controller
    volumes:
      - awx_redis_data:/data
    networks:
      - awx-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  awx-web:
    profiles:
      - controller
    image: ${AWX_IMAGE:-quay.io/ansible/awx:24.6.1}
    pull_policy: missing
    container_name: awx-web
    hostname: awx
    user: "0"
    # yamllint disable rule:line-length
    entrypoint:
      [
        "/bin/bash",
        "-c",
        "mkdir -p /etc/nginx/conf.d\ncat > /etc/nginx/conf.d/awx.conf << 'NGINXEOF'\nserver {\n    listen 8052 default_server;\n    server_name _;\n    root /var/lib/awx/public;\n    keepalive_timeout 65;\n\n    location /static/ {\n        alias /var/lib/awx/public/static/;\n        expires max;\n        add_header Cache-Control \"public, immutable\";\n    }\n\n    error_page 404 /custom_404.html;\n    error_page 502 /custom_502.html;\n    error_page 504 /custom_504.html;\n    location = /custom_404.html { root /var/lib/awx/public; internal; }\n    location = /custom_502.html { root /var/lib/awx/public; internal; }\n    location = /custom_504.html { root /var/lib/awx/public; internal; }\n\n    location / {\n        uwsgi_read_timeout 120s;\n        uwsgi_pass 127.0.0.1:8050;\n        include /etc/nginx/uwsgi_params;\n        uwsgi_param HTTP_X_FORWARDED_FOR $$proxy_add_x_forwarded_for;\n        uwsgi_param HTTP_X_REAL_IP $$remote_addr;\n        uwsgi_param HTTP_HOST $$http_host;\n        uwsgi_param HTTP_X_FORWARDED_PROTO $$http_x_forwarded_proto;\n    }\n\n    location /websocket {\n        proxy_pass http://127.0.0.1:8051;\n        proxy_http_version 1.1;\n        proxy_buffering off;\n        proxy_set_header Upgrade $$http_upgrade;\n        proxy_set_header Connection \"upgrade\";\n        proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;\n        proxy_set_header X-Real-IP $$remote_addr;\n        proxy_set_header Host $$http_host;\n    }\n}\nNGINXEOF\nmkdir -p /etc/tower\ncat > /etc/tower/settings.py << 'PYEOF'\nimport os\nALLOW_PLACEHOLDER_SECRETS = os.getenv('AAX_ALLOW_PLACEHOLDER_SECRETS', 'false').lower() == 'true'\nif not ALLOW_PLACEHOLDER_SECRETS:\n    for _name in ('DATABASE_PASSWORD', 'SECRET_KEY', 'AWX_ADMIN_PASSWORD'):\n        _value = os.getenv(_name, '')\n        if _value.startswith('REPLACE_WITH_') or _value.startswith('CHANGE_ME_'):\n            raise RuntimeError(f'{_name} contains placeholder value; set AAX_ALLOW_PLACEHOLDER_SECRETS=true only for local dev')\nDATABASES = {\n    'default': {\n        'ENGINE': 'django.db.backends.postgresql',\n        'NAME': os.getenv('DATABASE_NAME', 'awx'),\n        'USER': os.getenv('DATABASE_USER', 'awx'),\n        'PASSWORD': os.environ['DATABASE_PASSWORD'],\n        'HOST': os.getenv('DATABASE_HOST', 'awx-postgres'),\n        'PORT': int(os.getenv('DATABASE_PORT', 5432)),\n        'ATOMIC_REQUESTS': True,\n        'CONN_MAX_AGE': 0,\n    }\n}\nSECRET_KEY = os.environ['SECRET_KEY']\nALLOWED_HOSTS = [host.strip() for host in os.getenv('ALLOWED_HOSTS', 'localhost,127.0.0.1').split(',') if host.strip()]\nDEBUG = False\nSECURE_PROXY_SSL_HEADER = ('HTTP_X_FORWARDED_PROTO', 'https')\nUSE_X_FORWARDED_HOST = True\nCSRF_TRUSTED_ORIGINS = [origin.strip() for origin in os.getenv('AWX_CSRF_TRUSTED_ORIGINS', 'http://localhost:18080,http://localhost,http://127.0.0.1:18080,http://localhost:18088,http://127.0.0.1:18088').split(',') if origin.strip()]\nALLOW_INSECURE_COOKIES = os.getenv('AWX_ALLOW_INSECURE_COOKIES', 'false').lower() == 'true'\nSESSION_COOKIE_SECURE = not ALLOW_INSECURE_COOKIES\nCSRF_COOKIE_SECURE = not ALLOW_INSECURE_COOKIES\nSESSION_COOKIE_SAMESITE = 'Lax'\nCSRF_COOKIE_SAMESITE = 'Lax'\nREDIS_HOST = os.getenv('REDIS_SERVICE_HOST', 'awx-redis')\nREDIS_PORT = int(os.getenv('REDIS_SERVICE_PORT', 6379))\nBROKER_URL = f'redis://{REDIS_HOST}:{REDIS_PORT}/0'\nCACHES = {'default': {'BACKEND': 'awx.main.cache.AWXRedisCache', 'LOCATION': f'redis://{REDIS_HOST}:{REDIS_PORT}/1'}}\nCHANNEL_LAYERS = {'default': {'BACKEND': 'channels_redis.core.RedisChannelLayer', 'CONFIG': {'hosts': [BROKER_URL], 'capacity': 10000, 'group_expiry': 157784760}}}\n_DEFAULT_EE_IMAGE = os.getenv('DEFAULT_EXECUTION_ENVIRONMENT', 'ghcr.io/kpeacocke/aax-ee-base:latest')\nGLOBAL_JOB_EXECUTION_ENVIRONMENTS = [{'name': 'Default Execution Environment', 'image': _DEFAULT_EE_IMAGE}]\nCONTROL_PLANE_EXECUTION_ENVIRONMENT = os.getenv('CONTROL_PLANE_EXECUTION_ENVIRONMENT', _DEFAULT_EE_IMAGE)\nPYEOF\nexport AWX_SETTINGS_FILE=/etc/tower/settings.py\nexport DJANGO_SETTINGS_MODULE=awx.settings.production\nuntil PGPASSWORD=\"$DATABASE_PASSWORD\" psql -h \"$DATABASE_HOST\" -U \"$DATABASE_USER\" -d \"$DATABASE_NAME\" -c '\\q' 2>/dev/null; do\n  echo 'Waiting for database...'\n  sleep 1\ndone\necho 'Database is ready'\necho 'Running database migrations...'\nawx-manage migrate --noinput\necho 'Checking for admin user...'\nawx-manage shell <<'EOF'\nimport os\nfrom django.contrib.auth import get_user_model\nUser = get_user_model()\nusername = os.environ.get('AWX_ADMIN_USER', 'admin')\npassword = os.environ['AWX_ADMIN_PASSWORD']\nif not User.objects.filter(username=username).exists():\n    User.objects.create_superuser(username, '', password)\n    print('Admin user created')\nelse:\n    print('Admin user already exists')\nEOF\necho 'Registering default execution environments...'\nawx-manage register_default_execution_environments\necho 'Syncing CSRF trusted origins setting from environment...'\nawx-manage shell <<'EOF'\nimport os\nfrom awx.conf.models import Setting\nraw_origins = os.environ.get('AWX_CSRF_TRUSTED_ORIGINS')\nif raw_origins and raw_origins.strip():\n    origins = [origin.strip() for origin in raw_origins.split(',') if origin.strip()]\n    Setting.objects.update_or_create(key='CSRF_TRUSTED_ORIGINS', defaults={'value': origins})\n    print(f'CSRF_TRUSTED_ORIGINS synced: {origins}')\nelse:\n    print('AWX_CSRF_TRUSTED_ORIGINS is empty/unset; leaving DB setting unchanged')\nEOF\necho 'Starting AWX web service...'\nexec /usr/bin/launch_awx_web.sh",
      ]
    environment:
      DATABASE_HOST: ${DATABASE_HOST:-awx-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-awx}
      DATABASE_USER: ${DATABASE_USER:-awx}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set (non-empty) in .env or environment}
      REDIS_SERVICE_PORT: ${REDIS_PORT:-6379}
      REDIS_SERVICE_HOST: ${REDIS_HOST:-awx-redis}
      AWX_ADMIN_USER: ${AWX_ADMIN_USER:-admin}
      AWX_ADMIN_PASSWORD: ${AWX_ADMIN_PASSWORD:?AWX_ADMIN_PASSWORD must be set (non-empty) in .env or environment}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set (non-empty) in .env or environment}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      AWX_CSRF_TRUSTED_ORIGINS: ${AWX_CSRF_TRUSTED_ORIGINS:-http://localhost:18080,http://localhost,http://127.0.0.1:18080,http://localhost:18088,http://127.0.0.1:18088}
      AWX_ALLOW_INSECURE_COOKIES: ${AWX_ALLOW_INSECURE_COOKIES:-false}
      AWX_SETTINGS_FILE: /etc/tower/settings.py
      DJANGO_SETTINGS_MODULE: awx.settings.production
      AAX_ALLOW_PLACEHOLDER_SECRETS: ${AAX_ALLOW_PLACEHOLDER_SECRETS:-false}
      RECEPTOR_RELEASE_WORK: ${RECEPTOR_RELEASE_WORK:-false}
      DEFAULT_EXECUTION_ENVIRONMENT: ${DEFAULT_EXECUTION_ENVIRONMENT:-ghcr.io/kpeacocke/aax-ee-base:latest}
    ports:
      - "${HOST_BIND:-127.0.0.1}:${AWX_WEB_PORT:-18080}:8052"
    volumes:
      - awx_projects:/var/lib/awx/projects
      - awx_rsyslog:/var/log/tower
    networks:
      - awx-network
      - hub-network
    depends_on:
      awx-postgres:
        condition: service_healthy
      awx-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8052/api/v2/ping/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

  awx-task:
    profiles:
      - controller
    image: ${AWX_IMAGE:-quay.io/ansible/awx:24.6.1}
    pull_policy: missing
    container_name: awx-task
    hostname: awx
    user: "0"
    entrypoint:
      [
        "/bin/bash",
        "-c",
        "mkdir -p /etc/receptor && cat > /etc/receptor/receptor.conf << 'RECEOF'\n---\n- node:\n    id: awx\n- control-service:\n    service: control\n    filename: /var/lib/receptor/receptor.sock\n    permissions: \"0660\"\n- tcp-peer:\n    address: awx-receptor:8888\n- log-level:\n    level: info\nRECEOF\nmkdir -p /etc/tower && cat > /etc/tower/settings.py << 'PYEOF'\nimport os\nALLOW_PLACEHOLDER_SECRETS = os.getenv('AAX_ALLOW_PLACEHOLDER_SECRETS', 'false').lower() == 'true'\nif not ALLOW_PLACEHOLDER_SECRETS:\n    for _name in ('DATABASE_PASSWORD', 'SECRET_KEY'):\n        _value = os.getenv(_name, '')\n        if _value.startswith('REPLACE_WITH_') or _value.startswith('CHANGE_ME_'):\n            raise RuntimeError(f'{_name} contains placeholder value; set AAX_ALLOW_PLACEHOLDER_SECRETS=true only for local dev')\nDATABASES = {'default': {'ENGINE': 'django.db.backends.postgresql', 'NAME': os.getenv('DATABASE_NAME', 'awx'), 'USER': os.getenv('DATABASE_USER', 'awx'), 'PASSWORD': os.environ['DATABASE_PASSWORD'], 'HOST': os.getenv('DATABASE_HOST', 'awx-postgres'), 'PORT': int(os.getenv('DATABASE_PORT', 5432))}}\nSECRET_KEY = os.environ['SECRET_KEY']\nDEBUG = False\nALLOWED_HOSTS = [host.strip() for host in os.getenv('ALLOWED_HOSTS', 'localhost,127.0.0.1').split(',') if host.strip()]\nSECURE_PROXY_SSL_HEADER = ('HTTP_X_FORWARDED_PROTO', 'https')\nUSE_X_FORWARDED_HOST = True\nREDIS_HOST = os.getenv('REDIS_HOST', 'awx-redis')\nREDIS_PORT = int(os.getenv('REDIS_PORT', 6379))\nBROKER_URL = f'redis://{REDIS_HOST}:{REDIS_PORT}/0'\nCACHES = {'default': {'BACKEND': 'awx.main.cache.AWXRedisCache', 'LOCATION': f'redis://{REDIS_HOST}:{REDIS_PORT}/1'}}\nCHANNEL_LAYERS = {'default': {'BACKEND': 'channels_redis.core.RedisChannelLayer', 'CONFIG': {'hosts': [BROKER_URL], 'capacity': 10000, 'group_expiry': 157784760}}}\nBROADCAST_WEBSOCKET_SECRET = os.environ['SECRET_KEY']\n_DEFAULT_EE_IMAGE = os.getenv('DEFAULT_EXECUTION_ENVIRONMENT', 'ghcr.io/kpeacocke/aax-ee-base:latest')\nGLOBAL_JOB_EXECUTION_ENVIRONMENTS = [{'name': 'Default Execution Environment', 'image': _DEFAULT_EE_IMAGE}]\nCONTROL_PLANE_EXECUTION_ENVIRONMENT = os.getenv('CONTROL_PLANE_EXECUTION_ENVIRONMENT', _DEFAULT_EE_IMAGE)\nPYEOF\nexport AWX_SETTINGS_FILE=/etc/tower/settings.py\nexport DJANGO_SETTINGS_MODULE=awx.settings.production\nset -euo pipefail\nwait-for-migrations\nuntil bash -lc 'echo > /dev/tcp/awx-receptor/8888' 2>/dev/null; do\n  echo 'Waiting for awx-receptor:8888...'\n  sleep 2\ndone\nawx-manage provision_instance --hostname=\"awx\" --node_type=hybrid\nawx-manage provision_instance --hostname=\"receptor-controller\" --node_type=hop\nawx-manage provision_instance --hostname=\"receptor-hop\" --node_type=hop\nawx-manage provision_instance --hostname=\"receptor-execution\" --node_type=execution\nawx-manage deprovision_instance --hostname=\"awx-task\" || true\nawx-manage register_default_execution_environments\nawx-manage shell <<'EOF'\nfrom awx.main.models.ha import Instance\n\nfor hostname in ('awx', 'receptor-execution'):\n    try:\n        inst = Instance.objects.get(hostname=hostname)\n    except Instance.DoesNotExist:\n        continue\n    inst.enabled = True\n    inst.capacity_adjustment = 1.0\n    inst.save(update_fields=['enabled', 'capacity_adjustment'])\nEOF\nawx-manage register_queue --queuename=controlplane --hostnames=awx\nawx-manage register_queue --queuename=default --hostnames=awx,receptor-execution\nawx-manage shell <<'EOF'\nfrom awx.main.models import InstanceGroup\n\nfor name in ('controlplane', 'default'):\n    ig = InstanceGroup.objects.get(name=name)\n    members = list(ig.instances.values_list(\"hostname\", flat=True))\n    print(f'{name}: {members}')\n    if not members:\n        raise RuntimeError(f'Queue {name} has no members after bootstrap')\nEOF\nexec awx-manage run_dispatcher",
      ]
    # yamllint enable rule:line-length
    environment:
      DATABASE_USER: ${DATABASE_USER:-awx}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set (non-empty) in .env or environment}
      DATABASE_NAME: ${DATABASE_NAME:-awx}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_HOST: ${DATABASE_HOST:-awx-postgres}
      REDIS_HOST: ${REDIS_HOST:-awx-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set (non-empty) in .env or environment}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      AWX_SKIP_MIGRATIONS: ${AWX_SKIP_MIGRATIONS:-false}
      DJANGO_SETTINGS_MODULE: awx.settings.production
      AWX_SETTINGS_FILE: /etc/tower/settings.py
      AAX_ALLOW_PLACEHOLDER_SECRETS: ${AAX_ALLOW_PLACEHOLDER_SECRETS:-false}
      RECEPTOR_RELEASE_WORK: ${RECEPTOR_RELEASE_WORK:-false}
      DEFAULT_EXECUTION_ENVIRONMENT: ${DEFAULT_EXECUTION_ENVIRONMENT:-ghcr.io/kpeacocke/aax-ee-base:latest}
    volumes:
      - awx_projects:/var/lib/awx/projects
      - awx_rsyslog:/var/log/tower
      - receptor_data:/var/lib/receptor
    networks:
      - awx-network
      - hub-network
    restart: unless-stopped
    depends_on:
      awx-postgres:
        condition: service_healthy
      awx-redis:
        condition: service_healthy
      awx-receptor:
        condition: service_healthy
      receptor-hop:
        condition: service_healthy
      receptor-execution:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "awx-manage check || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s

  awx-receptor:
    image: quay.io/ansible/receptor:v1.6.4
    container_name: awx-receptor
    profiles:
      - controller
    hostname: receptor
    user: "0"
    environment:
      RECEPTOR_CONFIG: |
        ---
        - node:
            id: receptor-controller
            datadir: /var/lib/receptor
        - control-service:
            service: control
            filename: /var/lib/receptor/receptor.sock
            permissions: "0660"
        - tcp-listener:
            port: 8888
            bindaddr: 0.0.0.0
        - tcp-peer:
            address: receptor-hop:8888
        - work-command:
            worktype: local
            command: ansible-runner
            params: worker
            allowruntimeparams: true
        - log-level:
            level: info
    command:
      - sh
      - -c
      - |
        set -e
        mkdir -p /etc/receptor
        printf '%s' "$$RECEPTOR_CONFIG" > /etc/receptor/receptor.conf
        receptor --config /etc/receptor/receptor.conf
    volumes:
      - receptor_data:/var/lib/receptor
      - awx_projects:/var/lib/awx/projects
      - awx_rsyslog:/var/log/tower
    networks:
      - awx-network
    ports:
      - "${HOST_BIND:-127.0.0.1}:${AWX_RECEPTOR_PORT:-18888}:8888"
    healthcheck:
      test:
        [
          "CMD",
          "receptorctl",
          "--socket",
          "/var/lib/receptor/receptor.sock",
          "status",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  receptor-hop:
    image: quay.io/ansible/receptor:v1.6.4
    container_name: receptor-hop
    profiles:
      - controller
    hostname: receptor-hop
    user: "0"
    environment:
      RECEPTOR_CONFIG: |
        ---
        - node:
            id: receptor-hop
            datadir: /var/lib/receptor
        - control-service:
            service: control
            filename: /var/lib/receptor/receptor.sock
            permissions: "0660"
        - tcp-listener:
            port: 8888
            bindaddr: 0.0.0.0
        - log-level:
            level: info
    command:
      - sh
      - -c
      - |
        set -e
        mkdir -p /etc/receptor
        printf '%s' "$$RECEPTOR_CONFIG" > /etc/receptor/receptor.conf
        receptor --config /etc/receptor/receptor.conf
    volumes:
      - receptor_hop_data:/var/lib/receptor
    networks:
      - awx-network
    healthcheck:
      test:
        [
          "CMD",
          "receptorctl",
          "--socket",
          "/var/lib/receptor/receptor.sock",
          "status",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  receptor-execution:
    image: quay.io/ansible/receptor:v1.6.4
    container_name: receptor-execution
    profiles:
      - controller
    hostname: receptor-execution
    user: "0"
    environment:
      RECEPTOR_CONFIG: |
        ---
        - node:
            id: receptor-execution
            datadir: /var/lib/receptor
        - control-service:
            service: control
            filename: /var/lib/receptor/receptor.sock
            permissions: "0660"
        - tcp-listener:
            port: 8888
            bindaddr: 0.0.0.0
        - tcp-peer:
            address: receptor-hop:8888
        - work-command:
            worktype: ansible-runner
            command: ansible-runner
            params: worker
            allowruntimeparams: true
        - log-level:
            level: info
    command:
      - sh
      - -c
      - |
        set -e
        mkdir -p /etc/receptor
        printf '%s' "$$RECEPTOR_CONFIG" > /etc/receptor/receptor.conf
        receptor --config /etc/receptor/receptor.conf
    volumes:
      - receptor_execution_data:/var/lib/receptor
    networks:
      - awx-network
    healthcheck:
      test:
        [
          "CMD",
          "receptorctl",
          "--socket",
          "/var/lib/receptor/receptor.sock",
          "status",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  gateway:
    image: ${AAX_IMAGE_PREFIX:-ghcr.io/kpeacocke}/aax-gateway:${VERSION:-latest}
    pull_policy: always
    container_name: aax-gateway
    profiles:
      - controller
      - hub
      - eda
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    restart: unless-stopped
    ports:
      - "${HOST_BIND:-127.0.0.1}:${GATEWAY_PORT:-18088}:8080"
    networks:
      - awx-network
      - hub-network
      - eda-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8080/healthz >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  hub-postgres:
    image: postgres:16-alpine
    container_name: aax-hub-postgres
    restart: unless-stopped
    profiles:
      - hub
    environment:
      POSTGRES_USER: galaxy
      POSTGRES_PASSWORD: ${HUB_DB_PASSWORD:?HUB_DB_PASSWORD must be set (non-empty) in .env or environment}
      POSTGRES_DB: hub
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - hub_postgres_data:/var/lib/postgresql/data
    networks:
      - hub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U galaxy -d hub"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  hub-redis:
    image: redis:7-alpine
    container_name: aax-hub-redis
    restart: unless-stopped
    profiles:
      - hub
    command: redis-server --appendonly yes
    volumes:
      - hub_redis_data:/data
    networks:
      - hub-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  pulp-api:
    profiles:
      - hub
    image: ${AAX_IMAGE_PREFIX:-ghcr.io/kpeacocke}/aax-pulp:${VERSION:-latest}
    pull_policy: always
    container_name: aax-pulp-api
    restart: unless-stopped
    command: ["pulpcore-api"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      POSTGRES_HOST: hub-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: galaxy
      POSTGRES_PASSWORD: ${HUB_DB_PASSWORD:?HUB_DB_PASSWORD must be set (non-empty) in .env or environment}
      POSTGRES_DB: hub
      REDIS_HOST: hub-redis
      REDIS_PORT: 6379
      PULP_SECRET_KEY: "${PULP_SECRET_KEY:?PULP_SECRET_KEY must be set (non-empty) in .env or environment}"
      ALLOWED_HOSTS: ${PULP_ALLOWED_HOSTS:-localhost,127.0.0.1,[::1],pulp-api,pulp-content,galaxy-ng,gateway}
      PULP_CONTENT_ORIGIN: ${PULP_CONTENT_ORIGIN:-http://pulp-content:24816}
      PULP_ANSIBLE_API_HOSTNAME: ${PULP_ANSIBLE_API_HOSTNAME:-http://localhost:15001}
      PULP_SETTINGS: /etc/pulp/settings.py
      DJANGO_SETTINGS_MODULE: pulpcore.app.settings
      PULP_WORKERS: ${PULP_WORKERS:-2}
      GALAXY_ADMIN_USERNAME: ${GALAXY_ADMIN_USERNAME:-admin}
      GALAXY_ADMIN_PASSWORD: ${HUB_ADMIN_PASSWORD:?HUB_ADMIN_PASSWORD must be set (non-empty) in .env or environment}
      GALAXY_ADMIN_EMAIL: ${GALAXY_ADMIN_EMAIL:-admin@example.com}
    volumes:
      - hub_pulp_storage:/var/lib/pulp
      - hub_assets:/app/static
    networks:
      - hub-network
    depends_on:
      hub-postgres:
        condition: service_healthy
      hub-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:24817/pulp/api/v3/status/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  pulp-content:
    profiles:
      - hub
    image: ${AAX_IMAGE_PREFIX:-ghcr.io/kpeacocke}/aax-pulp:${VERSION:-latest}
    container_name: aax-pulp-content
    restart: unless-stopped
    command: ["pulpcore-content"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      POSTGRES_HOST: hub-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: galaxy
      POSTGRES_PASSWORD: ${HUB_DB_PASSWORD:?HUB_DB_PASSWORD must be set (non-empty) in .env or environment}
      POSTGRES_DB: hub
      REDIS_HOST: hub-redis
      REDIS_PORT: 6379
      PULP_SECRET_KEY: "${PULP_SECRET_KEY:?PULP_SECRET_KEY must be set (non-empty) in .env or environment}"
      ALLOWED_HOSTS: ${PULP_ALLOWED_HOSTS:-localhost,127.0.0.1,[::1],pulp-api,pulp-content,galaxy-ng,gateway}
      PULP_CONTENT_ORIGIN: ${PULP_CONTENT_ORIGIN:-http://pulp-content:24816}
      PULP_ANSIBLE_API_HOSTNAME: ${PULP_ANSIBLE_API_HOSTNAME:-http://localhost:15001}
      PULP_SETTINGS: /etc/pulp/settings.py
      DJANGO_SETTINGS_MODULE: pulpcore.app.settings
    volumes:
      - hub_pulp_storage:/var/lib/pulp
    networks:
      - hub-network
    depends_on:
      pulp-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:24816/pulp/content/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  pulp-worker:
    profiles:
      - hub
    image: ${AAX_IMAGE_PREFIX:-ghcr.io/kpeacocke}/aax-pulp:${VERSION:-latest}
    container_name: aax-pulp-worker
    restart: unless-stopped
    command: ["pulpcore-worker"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      POSTGRES_HOST: hub-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: galaxy
      POSTGRES_PASSWORD: ${HUB_DB_PASSWORD:?HUB_DB_PASSWORD must be set (non-empty) in .env or environment}
      POSTGRES_DB: hub
      REDIS_HOST: hub-redis
      REDIS_PORT: 6379
      PULP_SECRET_KEY: "${PULP_SECRET_KEY:?PULP_SECRET_KEY must be set (non-empty) in .env or environment}"
      ALLOWED_HOSTS: ${PULP_ALLOWED_HOSTS:-localhost,127.0.0.1,[::1],pulp-api,pulp-content,galaxy-ng,gateway}
      PULP_CONTENT_ORIGIN: ${PULP_CONTENT_ORIGIN:-http://pulp-content:24816}
      PULP_ANSIBLE_API_HOSTNAME: ${PULP_ANSIBLE_API_HOSTNAME:-http://localhost:15001}
      PULP_SETTINGS: /etc/pulp/settings.py
      DJANGO_SETTINGS_MODULE: pulpcore.app.settings
    volumes:
      - hub_pulp_storage:/var/lib/pulp
    networks:
      - hub-network
    depends_on:
      pulp-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pgrep -f 'pulpcore-worker|pulpcore.tasking.entrypoint' >/dev/null",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  galaxy-ng:
    profiles:
      - hub
    image: ${AAX_IMAGE_PREFIX:-ghcr.io/kpeacocke}/aax-galaxy-ng:${VERSION:-latest}
    pull_policy: always
    container_name: aax-galaxy-ng
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      POSTGRES_HOST: hub-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: galaxy
      POSTGRES_PASSWORD: ${HUB_DB_PASSWORD:?HUB_DB_PASSWORD must be set (non-empty) in .env or environment}
      POSTGRES_DB: hub
      REDIS_HOST: hub-redis
      REDIS_PORT: 6379
      HUB_PULP_API_URL: http://pulp-api:24817
      PULP_CONTENT_ORIGIN: ${PULP_CONTENT_ORIGIN:-http://pulp-content:24816}
      PULP_ANSIBLE_API_HOSTNAME: ${PULP_ANSIBLE_API_HOSTNAME:-http://galaxy-ng:8000}
      GALAXY_ADMIN_USERNAME: ${GALAXY_ADMIN_USERNAME:-admin}
      GALAXY_ADMIN_PASSWORD: ${HUB_ADMIN_PASSWORD:?HUB_ADMIN_PASSWORD must be set (non-empty) in .env or environment}
      GALAXY_ADMIN_EMAIL: ${GALAXY_ADMIN_EMAIL:-admin@example.com}
      GALAXY_SECRET_KEY: ${GALAXY_SECRET_KEY:?GALAXY_SECRET_KEY must be set (non-empty) in .env or environment}
      GALAXY_ALLOWED_HOSTS: ${GALAXY_ALLOWED_HOSTS:-localhost,127.0.0.1,galaxy-ng,gateway}
      GALAXY_SIGNATURE_UPLOAD_ENABLED: ${GALAXY_SIGNATURE_UPLOAD_ENABLED:-false}
      GALAXY_REQUIRE_CONTENT_APPROVAL: ${GALAXY_REQUIRE_CONTENT_APPROVAL:-true}
      GALAXY_AUTO_SIGN_COLLECTIONS: ${GALAXY_AUTO_SIGN_COLLECTIONS:-false}
      GALAXY_COLLECTION_SIGNING_SERVICE: ${GALAXY_COLLECTION_SIGNING_SERVICE:-}
      GALAXY_CONTAINER_SIGNING_SERVICE: ${GALAXY_CONTAINER_SIGNING_SERVICE:-}
      PULP_SETTINGS: /etc/pulp/settings.py
      DJANGO_SETTINGS_MODULE: pulpcore.app.settings
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      PULP_LOGGING_LEVEL: ${PULP_LOGGING_LEVEL:-INFO}
    volumes:
      - hub_pulp_storage:/var/lib/pulp
      - hub_assets:/app/static
    networks:
      - hub-network
    depends_on:
      pulp-api:
        condition: service_healthy
      pulp-content:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "code=$$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/api/galaxy/); echo $$code | grep -Eq '^(200|301|302|307|308|401|403)$$'",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    ports:
      - "${HOST_BIND:-127.0.0.1}:${GALAXY_PORT:-15001}:8000"

  eda-postgres:
    image: postgres:15
    container_name: eda-postgres
    profiles:
      - eda
    environment:
      POSTGRES_DB: ${EDA_DB_NAME:-eda}
      POSTGRES_USER: ${EDA_DB_USER:-eda}
      POSTGRES_PASSWORD: ${EDA_DB_PASSWORD:?EDA_DB_PASSWORD must be set (non-empty) in .env or environment}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
    volumes:
      - eda_postgres_data:/var/lib/postgresql/data
    networks:
      - eda-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  eda-redis:
    image: redis:7
    container_name: eda-redis
    command: redis-server --appendonly yes
    profiles:
      - eda
    volumes:
      - eda_redis_data:/data
    networks:
      - eda-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  eda-controller:
    image: ${AAX_IMAGE_PREFIX:-ghcr.io/kpeacocke}/aax-eda-controller:${VERSION:-latest}
    pull_policy: always
    container_name: eda-controller
    profiles:
      - eda
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      EDA_DB_HOST: eda-postgres
      EDA_DB_PORT: 5432
      EDA_DB_NAME: ${EDA_DB_NAME:-eda}
      EDA_DB_USER: ${EDA_DB_USER:-eda}
      EDA_DB_PASSWORD: ${EDA_DB_PASSWORD:?EDA_DB_PASSWORD must be set (non-empty) in .env or environment}
      EDA_REDIS_HOST: eda-redis
      EDA_REDIS_PORT: 6379
      EDA_PORT: 5000
      EDA_HOST: 0.0.0.0
      EDA_LOG_LEVEL: ${EDA_LOG_LEVEL:-INFO}
      EDA_SKIP_DB_WAIT: ${EDA_SKIP_DB_WAIT:-false}
    depends_on:
      eda-postgres:
        condition: service_healthy
      eda-redis:
        condition: service_healthy
    volumes:
      - eda_projects:/home/eda/projects
      - eda_logs:/var/log/eda
    ports:
      - "${HOST_BIND:-127.0.0.1}:${EDA_PORT:-15000}:5000"
    networks:
      - awx-network
      - eda-network
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          'import os,socket,urllib.request; sock=socket.socket(); sock.settimeout(2); sock.connect((os.getenv(''EDA_DB_HOST'',''eda-postgres''), int(os.getenv(''EDA_DB_PORT'',''5432'')))); sock.close(); sock=socket.socket(); sock.settimeout(2); sock.connect((os.getenv(''EDA_REDIS_HOST'',''eda-redis''), int(os.getenv(''EDA_REDIS_PORT'',''6379'')))); sock.close(); urllib.request.urlopen(f"http://127.0.0.1:{os.getenv(''EDA_PORT'',''5000'')}/health", timeout=3).read()',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

networks:
  ansible:
    driver: bridge
    labels:
      com.aax.description: "Network for Ansible Automation eXecution environments"
  awx-network:
    name: awx-network
    driver: bridge
  hub-network:
    driver: bridge
    labels:
      com.aax.description: "Network for Private Automation Hub services"
  eda-network:
    driver: bridge

volumes:
  workspace:
    labels:
      com.aax.description: "Shared workspace for Ansible operations"
  ee_builds:
    labels:
      com.aax.description: "Output directory for execution environment builds"
  ee_definitions:
    labels:
      com.aax.description: "Execution environment definition files"
  dev_workspace:
    labels:
      com.aax.description: "Development workspace for Ansible projects"
  awx_postgres_data:
    name: awx_postgres_data
  awx_redis_data:
    name: awx_redis_data
  awx_projects:
    name: awx_projects
  awx_rsyslog:
    name: awx_rsyslog
  receptor_data:
    name: receptor_data
  receptor_hop_data:
    name: receptor_hop_data
  receptor_execution_data:
    name: receptor_execution_data
  hub_postgres_data:
    labels:
      com.aax.description: "PostgreSQL database for Private Automation Hub"
  hub_redis_data:
    labels:
      com.aax.description: "Redis cache and message broker for Hub"
  hub_pulp_storage:
    labels:
      com.aax.description: "Pulp artifact and content storage"
  hub_assets:
    labels:
      com.aax.description: "Static assets for Galaxy NG UI"
  eda_postgres_data:
    labels:
      com.aax.description: "PostgreSQL database for Event Driven Automation"
  eda_redis_data:
    labels:
      com.aax.description: "Redis cache for Event Driven Automation"
  eda_projects:
    labels:
      com.aax.description: "Project workspace for Event Driven Automation"
  eda_logs:
    labels:
      com.aax.description: "Controller logs for Event Driven Automation"
