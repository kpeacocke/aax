name: aax
services:
  ee-base:
    build:
      context: ./images/ee-base
      args:
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-}
        VERSION: ${VERSION:-dev}
    image: aax/ee-base:${VERSION:-dev}
    working_dir: /workspace
    volumes:
      - workspace:/workspace:rw
    environment:
      ANSIBLE_NOCOWS: "1"
    networks:
      - ansible
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G
    healthcheck:
      test: ["CMD", "python3", "-c", "import ansible; import ansible_runner"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    command: ["sleep", "infinity"]

  ee-builder:
    build:
      context: ./images/ee-builder
      args:
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-}
        VERSION: ${VERSION:-dev}
        BASE_IMAGE: aax/ee-base:${VERSION:-dev}
    image: aax/ee-builder:${VERSION:-dev}
    depends_on:
      ee-base:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ee_definitions:/workspace:rw
      - ee_builds:/builds:rw
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      ANSIBLE_NOCOWS: "1"
    networks:
      - ansible
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G
    healthcheck:
      test: ["CMD", "ansible-builder", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    command: ["sleep", "infinity"]

  dev-tools:
    build:
      context: ./images/dev-tools
      args:
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-}
        VERSION: ${VERSION:-dev}
        BASE_IMAGE: aax/ee-base:${VERSION:-dev}
    image: aax/dev-tools:${VERSION:-dev}
    depends_on:
      ee-base:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - dev_workspace:/workspace:rw
    environment:
      ANSIBLE_NOCOWS: "1"
      PAGER: ""
    networks:
      - ansible
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G
    healthcheck:
      test: ["CMD", "ansible-navigator", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    command: ["sleep", "infinity"]

  awx-postgres:
    image: postgres:15
    container_name: awx-postgres
    profiles:
      - controller
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-awx}
      POSTGRES_USER: ${POSTGRES_USER:-awx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-awxpass}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
    volumes:
      - awx_postgres_data:/var/lib/postgresql/data
    networks:
      - awx-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  awx-redis:
    image: redis:7
    container_name: awx-redis
    command: redis-server --appendonly yes
    profiles:
      - controller
    volumes:
      - awx_redis_data:/data
    networks:
      - awx-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  awx-web:
    profiles:
      - controller
    build:
      context: ./images/awx
      args:
        VERSION: ${VERSION:-dev}
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-}
    image: ${AWX_IMAGE:-aax/awx:latest}
    container_name: awx-web
    hostname: awx
    user: "0"
    entrypoint:
      [
        "/bin/bash",
        "-c",
        "mkdir -p /etc/tower /etc/nginx/conf.d\ncat > /etc/tower/settings.py << 'PYEOF'\nimport os\nDATABASES = {\n    'default': {\n        'ENGINE': 'django.db.backends.postgresql',\n        'NAME': os.getenv('POSTGRES_NAME', 'awx'),\n        'USER': os.getenv('POSTGRES_USER', 'awx'),\n        'PASSWORD': os.getenv('POSTGRES_PASSWORD', 'awxpass'),\n        'HOST': os.getenv('POSTGRES_SERVICE_HOST', 'awx-postgres'),\n        'PORT': int(os.getenv('POSTGRES_SERVICE_PORT', 5432)),\n        'ATOMIC_REQUESTS': True,\n        'CONN_MAX_AGE': 0,\n    }\n}\nSECRET_KEY = os.getenv('SECRET_KEY', 'awxsecret_change_me')\nALLOWED_HOSTS = [host.strip() for host in os.getenv('ALLOWED_HOSTS', 'localhost,127.0.0.1').split(',') if host.strip()]\nDEBUG = False\nCSRF_TRUSTED_ORIGINS = [origin.strip() for origin in os.getenv('AWX_CSRF_TRUSTED_ORIGINS', 'http://localhost:8080,http://localhost,http://127.0.0.1:8080').split(',') if origin.strip()]\nSESSION_COOKIE_SECURE = False\nCSRF_COOKIE_SECURE = False\nSESSION_COOKIE_SAMESITE = 'Lax'\nCSRF_COOKIE_SAMESITE = 'Lax'\nREDIS_HOST = os.getenv('REDIS_SERVICE_HOST', 'awx-redis')\nREDIS_PORT = int(os.getenv('REDIS_SERVICE_PORT', 6379))\nCHANNELS = {\n    'default': {\n        'BACKEND': 'channels_redis.core.RedisChannelLayer',\n        'CONFIG': {'hosts': [(REDIS_HOST, REDIS_PORT)]},\n    },\n}\nPYEOF\ncat > /etc/nginx/conf.d/awx.conf << 'NGEOF'\nserver {\n    listen 8052 default_server;\n    listen [::]:8052 default_server;\n    server_name _;\n    client_max_body_size 0;\n\n    location /static/ {\n        alias /var/lib/awx/public/static/;\n        expires 1h;\n        add_header Cache-Control \"public\";\n    }\n\n    location /media/ {\n        alias /var/lib/awx/public/media/;\n        expires 1h;\n        add_header Cache-Control \"public\";\n    }\n\n    location / {\n        include uwsgi_params;\n        uwsgi_pass 127.0.0.1:8050;\n        uwsgi_read_timeout 120s;\n        uwsgi_send_timeout 120s;\n    }\n}\nNGEOF\nsed -i 's/autostart=true/autostart=false/g' /etc/supervisord_web.conf\nsed -i 's/programs=nginx,uwsgi,daphne,awx-cache-clear,ws-heartbeat/programs=nginx,uwsgi,awx-cache-clear/g' /etc/supervisord_web.conf\nsed -i '/\\[program:daphne\\]/a autostart=false' /etc/supervisord_web.conf\nsed -i '/\\[program:ws-heartbeat\\]/a autostart=false' /etc/supervisord_web.conf\n/usr/bin/launch_awx_web.sh",
      ]
    environment:
      POSTGRES_SERVICE_HOST: ${DATABASE_HOST:-awx-postgres}
      POSTGRES_SERVICE_PORT: ${DATABASE_PORT:-5432}
      POSTGRES_NAME: ${DATABASE_NAME:-awx}
      POSTGRES_USER: ${DATABASE_USER:-awx}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-awxpass}
      REDIS_SERVICE_PORT: ${REDIS_PORT:-6379}
      REDIS_SERVICE_HOST: ${REDIS_HOST:-awx-redis}
      AWX_ADMIN_USER: ${AWX_ADMIN_USER:-admin}
      AWX_ADMIN_PASSWORD: ${AWX_ADMIN_PASSWORD:-password}
      SECRET_KEY: ${SECRET_KEY:-awxsecret_change_me}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      AWX_CSRF_TRUSTED_ORIGINS: ${AWX_CSRF_TRUSTED_ORIGINS:-http://localhost:8080,http://localhost,http://127.0.0.1:8080}
      RECEPTOR_RELEASE_WORK: ${RECEPTOR_RELEASE_WORK:-true}
      DEFAULT_EXECUTION_ENVIRONMENT: ${DEFAULT_EXECUTION_ENVIRONMENT:-aax/ee-base:latest}
    ports:
      - "${AWX_WEB_PORT:-8080}:8052"
    volumes:
      - awx_projects:/var/lib/awx/projects
      - awx_rsyslog:/var/log/tower
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - awx-network
      - hub-network
    depends_on:
      awx-postgres:
        condition: service_healthy
      awx-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8052/api/v2/ping/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  awx-task:
    profiles:
      - controller
    build:
      context: ./images/awx
      args:
        VERSION: ${VERSION:-dev}
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-}
    image: ${AWX_IMAGE:-aax/awx:latest}
    container_name: awx-task
    hostname: awx
    user: "0"
    entrypoint:
      [
        "/bin/bash",
        "-c",
        "mkdir -p /etc/tower && cat > /etc/tower/settings.py << 'PYEOF'\nimport os\nDATABASES = {'default': {'ENGINE': 'django.db.backends.postgresql', 'NAME': os.getenv('DATABASE_NAME', 'awx'), 'USER': os.getenv('DATABASE_USER', 'awx'), 'PASSWORD': os.getenv('DATABASE_PASSWORD', 'awxpass'), 'HOST': os.getenv('DATABASE_HOST', 'awx-postgres'), 'PORT': int(os.getenv('DATABASE_PORT', 5432))}}\nSECRET_KEY = os.getenv('SECRET_KEY', 'awxsecret')\nDEBUG = False\nALLOWED_HOSTS = [host.strip() for host in os.getenv('ALLOWED_HOSTS', 'localhost,127.0.0.1').split(',') if host.strip()]\nBROADCAST_WEBSOCKET_SECRET = os.getenv('SECRET_KEY', 'awxsecret')\nPYEOF\nexec /usr/local/bin/dumb-init -- /usr/bin/launch_awx_task.sh",
      ]
    environment:
      DATABASE_USER: ${DATABASE_USER:-awx}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-awxpass}
      DATABASE_NAME: ${DATABASE_NAME:-awx}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_HOST: ${DATABASE_HOST:-awx-postgres}
      REDIS_HOST: ${REDIS_HOST:-awx-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      SECRET_KEY: ${SECRET_KEY:-awxsecret}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      AWX_SKIP_MIGRATIONS: ${AWX_SKIP_MIGRATIONS:-false}
      DJANGO_SETTINGS_MODULE: awx.settings.production
      AWX_SETTINGS_FILE: /dev/null
      RECEPTOR_RELEASE_WORK: ${RECEPTOR_RELEASE_WORK:-true}
      DEFAULT_EXECUTION_ENVIRONMENT: ${DEFAULT_EXECUTION_ENVIRONMENT:-aax/ee-base:latest}
    volumes:
      - awx_projects:/var/lib/awx/projects
      - awx_rsyslog:/var/log/tower
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - awx-network
      - hub-network
    depends_on:
      awx-postgres:
        condition: service_healthy
      awx-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "awx-manage check || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  awx-receptor:
    image: ${RECEPTOR_IMAGE:-quay.io/ansible/receptor:latest}
    container_name: awx-receptor
    profiles:
      - controller
    hostname: receptor
    user: "0"
    environment:
      RECEPTOR_CONFIG: |
        ---
        # Receptor node configuration for AWX execution

        # Node configuration
        - node:
            id: receptor-node

        # Control socket for receptorctl
        - control-service:
            service: control
            filename: /var/lib/receptor/receptor.sock
            permissions: "0660"

        # TCP listener for mesh communication
        - tcp-listener:
            port: 8888
            bindaddr: 0.0.0.0

        # Work command configuration for Ansible execution
        - work-command:
            worktype: ansible-runner
            command: ansible-runner
            params: worker
            allowruntimeparams: true

        # Logging configuration
        - log-level:
            level: info
    command:
      - sh
      - -c
      - |
        set -e
        mkdir -p /etc/receptor
        printf '%s' "$$RECEPTOR_CONFIG" > /etc/receptor/receptor.conf
        receptor --config /etc/receptor/receptor.conf
    volumes:
      - receptor_data:/var/lib/receptor
    networks:
      - awx-network
    ports:
      - "${AWX_RECEPTOR_PORT:-8888}:8888"
    healthcheck:
      test:
        [
          "CMD",
          "receptorctl",
          "--socket",
          "/var/lib/receptor/receptor.sock",
          "status",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  hub-postgres:
    image: postgres:16-alpine
    container_name: aax-hub-postgres
    profiles:
      - hub
    environment:
      POSTGRES_USER: galaxy
      POSTGRES_PASSWORD: ${HUB_DB_PASSWORD:-hubpassword}
      POSTGRES_DB: hub
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - hub_postgres_data:/var/lib/postgresql/data
    networks:
      - hub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U galaxy -d hub"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  hub-redis:
    image: redis:7-alpine
    container_name: aax-hub-redis
    profiles:
      - hub
    command: redis-server --appendonly yes
    volumes:
      - hub_redis_data:/data
    networks:
      - hub-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  pulp-api:
    profiles:
      - hub
    build:
      context: ./images/pulp
      dockerfile: Dockerfile.pulp
      args:
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-}
        VERSION: ${VERSION:-dev}
    image: aax/pulp:${VERSION:-dev}
    container_name: aax-pulp-api
    command: ["pulpcore-api"]
    environment:
      POSTGRES_HOST: hub-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: galaxy
      POSTGRES_PASSWORD: ${HUB_DB_PASSWORD:-hubpassword}
      POSTGRES_DB: hub
      REDIS_HOST: hub-redis
      REDIS_PORT: 6379
      PULP_SECRET_KEY: "${PULP_SECRET_KEY:?PULP_SECRET_KEY must be set (non-empty) in .env or environment}"
      PULP_ALLOWED_HOSTS: ${PULP_ALLOWED_HOSTS:-localhost,127.0.0.1,::1,pulp-api,pulp-content}
      PULP_CONTENT_ORIGIN: ${PULP_CONTENT_ORIGIN:-http://localhost:24816}
      PULP_ANSIBLE_API_HOSTNAME: ${PULP_ANSIBLE_API_HOSTNAME:-http://localhost:5001}
      PULP_SETTINGS: /etc/pulp/settings.py
      DJANGO_SETTINGS_MODULE: pulpcore.app.settings
      PULP_WORKERS: ${PULP_WORKERS:-2}
    volumes:
      - hub_pulp_storage:/var/lib/pulp
    networks:
      - hub-network
    depends_on:
      hub-postgres:
        condition: service_healthy
      hub-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:24817/pulp/api/v3/status/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    ports:
      - "${PULP_API_PORT:-24817}:24817"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G

  pulp-content:
    profiles:
      - hub
    image: aax/pulp:${VERSION:-dev}
    container_name: aax-pulp-content
    command: ["pulpcore-content"]
    environment:
      POSTGRES_HOST: hub-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: galaxy
      POSTGRES_PASSWORD: ${HUB_DB_PASSWORD:-hubpassword}
      POSTGRES_DB: hub
      REDIS_HOST: hub-redis
      REDIS_PORT: 6379
      PULP_SECRET_KEY: "${PULP_SECRET_KEY:?PULP_SECRET_KEY must be set (non-empty) in .env or environment}"
      PULP_ALLOWED_HOSTS: ${PULP_ALLOWED_HOSTS:-localhost,127.0.0.1,::1,pulp-api,pulp-content}
      PULP_CONTENT_ORIGIN: ${PULP_CONTENT_ORIGIN:-http://localhost:24816}
      PULP_ANSIBLE_API_HOSTNAME: ${PULP_ANSIBLE_API_HOSTNAME:-http://localhost:5001}
      PULP_SETTINGS: /etc/pulp/settings.py
      DJANGO_SETTINGS_MODULE: pulpcore.app.settings
    volumes:
      - hub_pulp_storage:/var/lib/pulp
    networks:
      - hub-network
    depends_on:
      pulp-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:24816/pulp/content/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    ports:
      - "${PULP_CONTENT_PORT:-24816}:24816"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  pulp-worker:
    profiles:
      - hub
    image: aax/pulp:${VERSION:-dev}
    container_name: aax-pulp-worker
    command: ["pulpcore-worker"]
    environment:
      POSTGRES_HOST: hub-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: galaxy
      POSTGRES_PASSWORD: ${HUB_DB_PASSWORD:-hubpassword}
      POSTGRES_DB: hub
      REDIS_HOST: hub-redis
      REDIS_PORT: 6379
      PULP_SECRET_KEY: "${PULP_SECRET_KEY:?PULP_SECRET_KEY must be set (non-empty) in .env or environment}"
      PULP_ALLOWED_HOSTS: ${PULP_ALLOWED_HOSTS:-localhost,127.0.0.1,::1,pulp-api,pulp-content}
      PULP_CONTENT_ORIGIN: ${PULP_CONTENT_ORIGIN:-http://localhost:24816}
      PULP_ANSIBLE_API_HOSTNAME: ${PULP_ANSIBLE_API_HOSTNAME:-http://localhost:5001}
      PULP_SETTINGS: /etc/pulp/settings.py
      DJANGO_SETTINGS_MODULE: pulpcore.app.settings
    volumes:
      - hub_pulp_storage:/var/lib/pulp
    networks:
      - hub-network
    depends_on:
      pulp-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "pulpcore-worker"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G

  galaxy-ng:
    profiles:
      - hub
    build:
      context: ./images/galaxy-ng
      args:
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-}
        VERSION: ${VERSION:-dev}
    image: aax/galaxy-ng:${VERSION:-dev}
    container_name: aax-galaxy-ng
    environment:
      POSTGRES_HOST: hub-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: galaxy
      POSTGRES_PASSWORD: ${HUB_DB_PASSWORD:-hubpassword}
      POSTGRES_DB: hub
      REDIS_HOST: hub-redis
      REDIS_PORT: 6379
      PULP_API_ROOT: http://pulp-api:24817
      PULP_CONTENT_ORIGIN: ${PULP_CONTENT_ORIGIN:-http://localhost:24816}
      PULP_ANSIBLE_API_HOSTNAME: ${PULP_ANSIBLE_API_HOSTNAME:-http://localhost:5001}
      GALAXY_ADMIN_USERNAME: ${GALAXY_ADMIN_USERNAME:-admin}
      GALAXY_ADMIN_PASSWORD: ${HUB_ADMIN_PASSWORD:-changeme}
      GALAXY_ADMIN_EMAIL: ${GALAXY_ADMIN_EMAIL:-admin@example.com}
      GALAXY_SECRET_KEY: ${GALAXY_SECRET_KEY:-change-me-to-a-long-random-string}
      GALAXY_ALLOWED_HOSTS: ${GALAXY_ALLOWED_HOSTS:-*}
      GALAXY_SIGNATURE_UPLOAD_ENABLED: ${GALAXY_SIGNATURE_UPLOAD_ENABLED:-false}
      GALAXY_REQUIRE_CONTENT_APPROVAL: ${GALAXY_REQUIRE_CONTENT_APPROVAL:-true}
      GALAXY_AUTO_SIGN_COLLECTIONS: ${GALAXY_AUTO_SIGN_COLLECTIONS:-false}
      GALAXY_COLLECTION_SIGNING_SERVICE: ${GALAXY_COLLECTION_SIGNING_SERVICE:-}
      GALAXY_CONTAINER_SIGNING_SERVICE: ${GALAXY_CONTAINER_SIGNING_SERVICE:-}
      DJANGO_SETTINGS_MODULE: galaxy_ng.app.settings
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      PULP_LOGGING_LEVEL: ${PULP_LOGGING_LEVEL:-INFO}
    volumes:
      - hub_pulp_storage:/var/lib/pulp
      - hub_assets:/app/static
    networks:
      - hub-network
    depends_on:
      pulp-api:
        condition: service_healthy
      pulp-content:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/galaxy/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    ports:
      - "${GALAXY_PORT:-5001}:8000"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G

  eda-postgres:
    image: postgres:15
    container_name: eda-postgres
    profiles:
      - eda
    environment:
      POSTGRES_DB: ${EDA_DB_NAME:-eda}
      POSTGRES_USER: ${EDA_DB_USER:-eda}
      POSTGRES_PASSWORD: ${EDA_DB_PASSWORD:-edapass}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
    volumes:
      - eda_postgres_data:/var/lib/postgresql/data
    networks:
      - eda-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  eda-redis:
    image: redis:7
    container_name: eda-redis
    command: redis-server --appendonly yes
    profiles:
      - eda
    volumes:
      - eda_redis_data:/data
    networks:
      - eda-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  eda-controller:
    build:
      context: images/eda-controller
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        BUILD_DATE: ${BUILD_DATE:-unknown}
        VCS_REF: ${VCS_REF:-unknown}
        EDA_VERSION: 1.1.3
    container_name: eda-controller
    profiles:
      - eda
    environment:
      EDA_DB_HOST: eda-postgres
      EDA_DB_PORT: 5432
      EDA_DB_NAME: ${EDA_DB_NAME:-eda}
      EDA_DB_USER: ${EDA_DB_USER:-eda}
      EDA_DB_PASSWORD: ${EDA_DB_PASSWORD:-edapass}
      EDA_REDIS_HOST: eda-redis
      EDA_REDIS_PORT: 6379
      EDA_PORT: 5000
      EDA_HOST: 0.0.0.0
      EDA_LOG_LEVEL: ${EDA_LOG_LEVEL:-INFO}
      EDA_SKIP_DB_WAIT: ${EDA_SKIP_DB_WAIT:-false}
    depends_on:
      eda-postgres:
        condition: service_healthy
      eda-redis:
        condition: service_healthy
    volumes:
      - eda_projects:/home/eda/projects
      - eda_logs:/var/log/eda
    ports:
      - "${EDA_PORT:-5000}:5000"
    networks:
      - eda-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  ansible:
    driver: bridge
    labels:
      com.aax.description: "Network for Ansible Automation eXecution environments"
  awx-network:
    name: awx-network
    driver: bridge
  hub-network:
    driver: bridge
    labels:
      com.aax.description: "Network for Private Automation Hub services"
  eda-network:
    driver: bridge

volumes:
  workspace:
    labels:
      com.aax.description: "Shared workspace for Ansible operations"
  ee_builds:
    labels:
      com.aax.description: "Output directory for execution environment builds"
  ee_definitions:
    labels:
      com.aax.description: "Execution environment definition files"
  dev_workspace:
    labels:
      com.aax.description: "Development workspace for Ansible projects"
  awx_postgres_data:
    name: awx_postgres_data
  awx_redis_data:
    name: awx_redis_data
  awx_projects:
    name: awx_projects
  awx_rsyslog:
    name: awx_rsyslog
  receptor_data:
    name: receptor_data
  hub_postgres_data:
    labels:
      com.aax.description: "PostgreSQL database for Private Automation Hub"
  hub_redis_data:
    labels:
      com.aax.description: "Redis cache and message broker for Hub"
  hub_pulp_storage:
    labels:
      com.aax.description: "Pulp artifact and content storage"
  hub_assets:
    labels:
      com.aax.description: "Static assets for Galaxy NG UI"
  eda_postgres_data:
  eda_redis_data:
  eda_projects:
  eda_logs:
