name: aax
services:
  ee-base:
    build:
      context: ./images/ee-base
      args:
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-}
        VERSION: ${VERSION:-1.0.0}
    image: aax/ee-base:${VERSION:-1.0.0}
    pull_policy: build
    working_dir: /workspace
    volumes:
      - workspace:/workspace:rw
    environment:
      ANSIBLE_NOCOWS: "1"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - ansible
    healthcheck:
      test: ["CMD", "python3", "-c", "import ansible; import ansible_runner"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    command: ["sleep", "infinity"]

  ee-builder:
    build:
      context: ./images/ee-builder
      args:
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-}
        VERSION: ${VERSION:-1.0.0}
        BASE_IMAGE: aax/ee-base:${VERSION:-1.0.0}
    image: aax/ee-builder:${VERSION:-1.0.0}
    pull_policy: build
    depends_on:
      ee-base:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ee_definitions:/workspace:rw
      - ee_builds:/builds:rw
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      ANSIBLE_NOCOWS: "1"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - ansible
    healthcheck:
      test: ["CMD", "ansible-builder", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    command: ["sleep", "infinity"]

  dev-tools:
    build:
      context: ./images/dev-tools
      args:
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-}
        VERSION: ${VERSION:-1.0.0}
        BASE_IMAGE: aax/ee-base:${VERSION:-1.0.0}
    image: aax/dev-tools:${VERSION:-1.0.0}
    pull_policy: build
    depends_on:
      ee-base:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - dev_workspace:/workspace:rw
    environment:
      ANSIBLE_NOCOWS: "1"
      PAGER: ""
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - ansible
    healthcheck:
      test: ["CMD", "ansible-navigator", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    command: ["sleep", "infinity"]

  awx-postgres:
    image: postgres:15
    container_name: awx-postgres
    profiles:
      - controller
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-awx}
      POSTGRES_USER: ${POSTGRES_USER:-awx}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set (non-empty) in .env or environment}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
    volumes:
      - awx_postgres_data:/var/lib/postgresql/data
    networks:
      - awx-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  awx-redis:
    image: redis:7
    container_name: awx-redis
    command: redis-server --appendonly yes
    profiles:
      - controller
    volumes:
      - awx_redis_data:/data
    networks:
      - awx-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  awx-web:
    profiles:
      - controller
    build:
      context: ./images/awx
      args:
        VERSION: ${VERSION:-1.0.0}
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-}
    image: ${AWX_IMAGE:-aax/awx:1.0.0}
    pull_policy: build
    container_name: awx-web
    hostname: awx
    user: "0"
    # yamllint disable rule:line-length
    entrypoint:
      [
        "/bin/bash",
        "-c",
        "mkdir -p /etc/tower /etc/nginx/conf.d\ncat > /etc/tower/settings.py << 'PYEOF'\nimport os\nALLOW_PLACEHOLDER_SECRETS = os.getenv('AAX_ALLOW_PLACEHOLDER_SECRETS', 'false').lower() == 'true'\nif not ALLOW_PLACEHOLDER_SECRETS:\n    for _name in ('DATABASE_PASSWORD', 'SECRET_KEY', 'AWX_ADMIN_PASSWORD'):\n        _value = os.getenv(_name, '')\n        if _value.startswith('REPLACE_WITH_') or _value.startswith('CHANGE_ME_'):\n            raise RuntimeError(f'{_name} contains placeholder value; set AAX_ALLOW_PLACEHOLDER_SECRETS=true only for local dev')\nDATABASES = {\n    'default': {\n        'ENGINE': 'django.db.backends.postgresql',\n        'NAME': os.getenv('DATABASE_NAME', 'awx'),\n        'USER': os.getenv('DATABASE_USER', 'awx'),\n        'PASSWORD': os.environ['DATABASE_PASSWORD'],\n        'HOST': os.getenv('DATABASE_HOST', 'awx-postgres'),\n        'PORT': int(os.getenv('DATABASE_PORT', 5432)),\n        'ATOMIC_REQUESTS': True,\n        'CONN_MAX_AGE': 0,\n    }\n}\nSECRET_KEY = os.environ['SECRET_KEY']\nALLOWED_HOSTS = [host.strip() for host in os.getenv('ALLOWED_HOSTS', 'localhost,127.0.0.1').split(',') if host.strip()]\nDEBUG = False\nCSRF_TRUSTED_ORIGINS = [origin.strip() for origin in os.getenv('AWX_CSRF_TRUSTED_ORIGINS', 'http://localhost:8080,http://localhost,http://127.0.0.1:8080,http://localhost:8088,http://127.0.0.1:8088').split(',') if origin.strip()]\nALLOW_INSECURE_COOKIES = os.getenv('AWX_ALLOW_INSECURE_COOKIES', 'false').lower() == 'true'\nSESSION_COOKIE_SECURE = not ALLOW_INSECURE_COOKIES\nCSRF_COOKIE_SECURE = not ALLOW_INSECURE_COOKIES\nSESSION_COOKIE_SAMESITE = 'Lax'\nCSRF_COOKIE_SAMESITE = 'Lax'\nREDIS_HOST = os.getenv('REDIS_SERVICE_HOST', 'awx-redis')\nREDIS_PORT = int(os.getenv('REDIS_SERVICE_PORT', 6379))\nCHANNELS = {\n    'default': {\n        'BACKEND': 'channels_redis.core.RedisChannelLayer',\n        'CONFIG': {'hosts': [(REDIS_HOST, REDIS_PORT)]},\n    },\n}\nPYEOF\ncat > /etc/nginx/conf.d/awx.conf << 'NGEOF'\nserver {\n    listen 8052 default_server;\n    listen [::]:8052 default_server;\n    server_name _;\n    client_max_body_size 0;\n\n    location /static/ {\n        alias /var/lib/awx/public/static/;\n        expires 1h;\n        add_header Cache-Control \"public\";\n    }\n\n    location /media/ {\n        alias /var/lib/awx/public/media/;\n        expires 1h;\n        add_header Cache-Control \"public\";\n    }\n\n    location / {\n        include uwsgi_params;\n        uwsgi_pass 127.0.0.1:8050;\n        uwsgi_read_timeout 120s;\n        uwsgi_send_timeout 120s;\n    }\n}\nNGEOF\nsed -i 's/autostart=true/autostart=false/g' /etc/supervisord_web.conf\nsed -i 's/programs=nginx,uwsgi,daphne,awx-cache-clear,ws-heartbeat/programs=nginx,uwsgi,awx-cache-clear/g' /etc/supervisord_web.conf\nsed -i '/\\[program:daphne\\]/a autostart=false' /etc/supervisord_web.conf\nsed -i '/\\[program:ws-heartbeat\\]/a autostart=false' /etc/supervisord_web.conf\n/usr/bin/launch_awx_web.sh",
      ]
    environment:
      DATABASE_HOST: ${DATABASE_HOST:-awx-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-awx}
      DATABASE_USER: ${DATABASE_USER:-awx}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set (non-empty) in .env or environment}
      REDIS_SERVICE_PORT: ${REDIS_PORT:-6379}
      REDIS_SERVICE_HOST: ${REDIS_HOST:-awx-redis}
      AWX_ADMIN_USER: ${AWX_ADMIN_USER:-admin}
      AWX_ADMIN_PASSWORD: ${AWX_ADMIN_PASSWORD:?AWX_ADMIN_PASSWORD must be set (non-empty) in .env or environment}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set (non-empty) in .env or environment}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      AWX_CSRF_TRUSTED_ORIGINS: ${AWX_CSRF_TRUSTED_ORIGINS:-http://localhost:8080,http://localhost,http://127.0.0.1:8080,http://localhost:8088,http://127.0.0.1:8088}
      AWX_ALLOW_INSECURE_COOKIES: ${AWX_ALLOW_INSECURE_COOKIES:-false}
      AAX_ALLOW_PLACEHOLDER_SECRETS: ${AAX_ALLOW_PLACEHOLDER_SECRETS:-false}
      RECEPTOR_RELEASE_WORK: ${RECEPTOR_RELEASE_WORK:-true}
      DEFAULT_EXECUTION_ENVIRONMENT: ${DEFAULT_EXECUTION_ENVIRONMENT:-aax/ee-base:1.0.0}
    ports:
      - "${HOST_BIND:-127.0.0.1}:${AWX_WEB_PORT:-8080}:8052"
    volumes:
      - awx_projects:/var/lib/awx/projects
      - awx_rsyslog:/var/log/tower
    networks:
      - awx-network
      - hub-network
    depends_on:
      awx-postgres:
        condition: service_healthy
      awx-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8052/api/v2/ping/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  awx-task:
    profiles:
      - controller
    build:
      context: ./images/awx
      args:
        VERSION: ${VERSION:-1.0.0}
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-}
    image: ${AWX_IMAGE:-aax/awx:1.0.0}
    pull_policy: build
    container_name: awx-task
    hostname: awx
    user: "0"
    entrypoint:
      [
        "/bin/bash",
        "-c",
        "mkdir -p /etc/tower && cat > /etc/tower/settings.py << 'PYEOF'\nimport os\nALLOW_PLACEHOLDER_SECRETS = os.getenv('AAX_ALLOW_PLACEHOLDER_SECRETS', 'false').lower() == 'true'\nif not ALLOW_PLACEHOLDER_SECRETS:\n    for _name in ('DATABASE_PASSWORD', 'SECRET_KEY'):\n        _value = os.getenv(_name, '')\n        if _value.startswith('REPLACE_WITH_') or _value.startswith('CHANGE_ME_'):\n            raise RuntimeError(f'{_name} contains placeholder value; set AAX_ALLOW_PLACEHOLDER_SECRETS=true only for local dev')\nDATABASES = {'default': {'ENGINE': 'django.db.backends.postgresql', 'NAME': os.getenv('DATABASE_NAME', 'awx'), 'USER': os.getenv('DATABASE_USER', 'awx'), 'PASSWORD': os.environ['DATABASE_PASSWORD'], 'HOST': os.getenv('DATABASE_HOST', 'awx-postgres'), 'PORT': int(os.getenv('DATABASE_PORT', 5432))}}\nSECRET_KEY = os.environ['SECRET_KEY']\nDEBUG = False\nALLOWED_HOSTS = [host.strip() for host in os.getenv('ALLOWED_HOSTS', 'localhost,127.0.0.1').split(',') if host.strip()]\nBROADCAST_WEBSOCKET_SECRET = os.environ['SECRET_KEY']\nPYEOF\nexec /usr/local/bin/dumb-init -- /usr/bin/launch_awx_task.sh",
      ]
    # yamllint enable rule:line-length
    environment:
      DATABASE_USER: ${DATABASE_USER:-awx}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set (non-empty) in .env or environment}
      DATABASE_NAME: ${DATABASE_NAME:-awx}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_HOST: ${DATABASE_HOST:-awx-postgres}
      REDIS_HOST: ${REDIS_HOST:-awx-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set (non-empty) in .env or environment}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      AWX_SKIP_MIGRATIONS: ${AWX_SKIP_MIGRATIONS:-false}
      DJANGO_SETTINGS_MODULE: awx.settings.production
      AWX_SETTINGS_FILE: /dev/null
      AAX_ALLOW_PLACEHOLDER_SECRETS: ${AAX_ALLOW_PLACEHOLDER_SECRETS:-false}
      RECEPTOR_RELEASE_WORK: ${RECEPTOR_RELEASE_WORK:-true}
      DEFAULT_EXECUTION_ENVIRONMENT: ${DEFAULT_EXECUTION_ENVIRONMENT:-aax/ee-base:1.0.0}
    volumes:
      - awx_projects:/var/lib/awx/projects
      - awx_rsyslog:/var/log/tower
    networks:
      - awx-network
      - hub-network
    depends_on:
      awx-postgres:
        condition: service_healthy
      awx-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "awx-manage check || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  awx-receptor:
    image: ${RECEPTOR_IMAGE:-quay.io/ansible/receptor:1.5.7}
    container_name: awx-receptor
    profiles:
      - controller
    hostname: receptor
    user: "0"
    environment:
      RECEPTOR_CONFIG: |
        ---
        - node:
            id: receptor-controller
        - control-service:
            service: control
            filename: /var/lib/receptor/receptor.sock
            permissions: "0660"
        - tcp-listener:
            port: 8888
            bindaddr: 0.0.0.0
        - tcp-peer:
            address: receptor-hop:8888
        - log-level:
            level: info
    command:
      - sh
      - -c
      - |
        set -e
        mkdir -p /etc/receptor
        printf '%s' "$$RECEPTOR_CONFIG" > /etc/receptor/receptor.conf
        receptor --config /etc/receptor/receptor.conf
    volumes:
      - receptor_data:/var/lib/receptor
    networks:
      - awx-network
    ports:
      - "${HOST_BIND:-127.0.0.1}:${AWX_RECEPTOR_PORT:-8888}:8888"
    healthcheck:
      test:
        [
          "CMD",
          "receptorctl",
          "--socket",
          "/var/lib/receptor/receptor.sock",
          "status",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  receptor-hop:
    image: ${RECEPTOR_IMAGE:-quay.io/ansible/receptor:1.5.7}
    container_name: receptor-hop
    profiles:
      - controller
    hostname: receptor-hop
    user: "0"
    environment:
      RECEPTOR_CONFIG: |
        ---
        - node:
            id: receptor-hop
        - control-service:
            service: control
            filename: /var/lib/receptor/receptor.sock
            permissions: "0660"
        - tcp-listener:
            port: 8888
            bindaddr: 0.0.0.0
        - tcp-peer:
            address: awx-receptor:8888
        - tcp-peer:
            address: receptor-execution:8888
        - log-level:
            level: info
    command:
      - sh
      - -c
      - |
        set -e
        mkdir -p /etc/receptor
        printf '%s' "$$RECEPTOR_CONFIG" > /etc/receptor/receptor.conf
        receptor --config /etc/receptor/receptor.conf
    volumes:
      - receptor_hop_data:/var/lib/receptor
    networks:
      - awx-network
    healthcheck:
      test:
        [
          "CMD",
          "receptorctl",
          "--socket",
          "/var/lib/receptor/receptor.sock",
          "status",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  receptor-execution:
    image: ${RECEPTOR_IMAGE:-quay.io/ansible/receptor:1.5.7}
    container_name: receptor-execution
    profiles:
      - controller
    hostname: receptor-execution
    user: "0"
    environment:
      RECEPTOR_CONFIG: |
        ---
        - node:
            id: receptor-execution
        - control-service:
            service: control
            filename: /var/lib/receptor/receptor.sock
            permissions: "0660"
        - tcp-listener:
            port: 8888
            bindaddr: 0.0.0.0
        - tcp-peer:
            address: receptor-hop:8888
        - work-command:
            worktype: ansible-runner
            command: ansible-runner
            params: worker
            allowruntimeparams: true
        - log-level:
            level: info
    command:
      - sh
      - -c
      - |
        set -e
        mkdir -p /etc/receptor
        printf '%s' "$$RECEPTOR_CONFIG" > /etc/receptor/receptor.conf
        receptor --config /etc/receptor/receptor.conf
    volumes:
      - receptor_execution_data:/var/lib/receptor
    networks:
      - awx-network
    healthcheck:
      test:
        [
          "CMD",
          "receptorctl",
          "--socket",
          "/var/lib/receptor/receptor.sock",
          "status",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  gateway:
    build:
      context: ./images/gateway
      args:
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-}
        VERSION: ${VERSION:-1.0.0}
    image: aax/gateway:${VERSION:-1.0.0}
    pull_policy: build
    container_name: aax-gateway
    profiles:
      - controller
      - hub
      - eda
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "${HOST_BIND:-127.0.0.1}:${GATEWAY_PORT:-8088}:8080"
    networks:
      - awx-network
      - hub-network
      - eda-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8080/healthz >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  hub-postgres:
    image: postgres:16-alpine
    container_name: aax-hub-postgres
    profiles:
      - hub
    environment:
      POSTGRES_USER: galaxy
      POSTGRES_PASSWORD: ${HUB_DB_PASSWORD:?HUB_DB_PASSWORD must be set (non-empty) in .env or environment}
      POSTGRES_DB: hub
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - hub_postgres_data:/var/lib/postgresql/data
    networks:
      - hub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U galaxy -d hub"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  hub-redis:
    image: redis:7-alpine
    container_name: aax-hub-redis
    profiles:
      - hub
    command: redis-server --appendonly yes
    volumes:
      - hub_redis_data:/data
    networks:
      - hub-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  pulp-api:
    profiles:
      - hub
    build:
      context: ./images/pulp
      dockerfile: Dockerfile.pulp
      args:
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-}
        VERSION: ${VERSION:-1.0.0}
    image: aax/pulp:${VERSION:-1.0.0}
    pull_policy: build
    container_name: aax-pulp-api
    command: ["pulpcore-api"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      POSTGRES_HOST: hub-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: galaxy
      POSTGRES_PASSWORD: ${HUB_DB_PASSWORD:?HUB_DB_PASSWORD must be set (non-empty) in .env or environment}
      POSTGRES_DB: hub
      REDIS_HOST: hub-redis
      REDIS_PORT: 6379
      PULP_SECRET_KEY: "${PULP_SECRET_KEY:?PULP_SECRET_KEY must be set (non-empty) in .env or environment}"
      PULP_ALLOWED_HOSTS: ${PULP_ALLOWED_HOSTS:-localhost,127.0.0.1,::1,pulp-api,pulp-content}
      PULP_CONTENT_ORIGIN: ${PULP_CONTENT_ORIGIN:-http://localhost:24816}
      PULP_ANSIBLE_API_HOSTNAME: ${PULP_ANSIBLE_API_HOSTNAME:-http://localhost:5001}
      PULP_SETTINGS: /etc/pulp/settings.py
      DJANGO_SETTINGS_MODULE: pulpcore.app.settings
      PULP_WORKERS: ${PULP_WORKERS:-2}
    volumes:
      - hub_pulp_storage:/var/lib/pulp
    networks:
      - hub-network
    depends_on:
      hub-postgres:
        condition: service_healthy
      hub-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:24817/pulp/api/v3/status/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  pulp-content:
    profiles:
      - hub
    image: aax/pulp:${VERSION:-1.0.0}
    container_name: aax-pulp-content
    command: ["pulpcore-content"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      POSTGRES_HOST: hub-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: galaxy
      POSTGRES_PASSWORD: ${HUB_DB_PASSWORD:?HUB_DB_PASSWORD must be set (non-empty) in .env or environment}
      POSTGRES_DB: hub
      REDIS_HOST: hub-redis
      REDIS_PORT: 6379
      PULP_SECRET_KEY: "${PULP_SECRET_KEY:?PULP_SECRET_KEY must be set (non-empty) in .env or environment}"
      PULP_ALLOWED_HOSTS: ${PULP_ALLOWED_HOSTS:-localhost,127.0.0.1,::1,pulp-api,pulp-content}
      PULP_CONTENT_ORIGIN: ${PULP_CONTENT_ORIGIN:-http://localhost:24816}
      PULP_ANSIBLE_API_HOSTNAME: ${PULP_ANSIBLE_API_HOSTNAME:-http://localhost:5001}
      PULP_SETTINGS: /etc/pulp/settings.py
      DJANGO_SETTINGS_MODULE: pulpcore.app.settings
    volumes:
      - hub_pulp_storage:/var/lib/pulp
    networks:
      - hub-network
    depends_on:
      pulp-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:24816/pulp/content/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  pulp-worker:
    profiles:
      - hub
    image: aax/pulp:${VERSION:-1.0.0}
    container_name: aax-pulp-worker
    command: ["pulpcore-worker"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      POSTGRES_HOST: hub-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: galaxy
      POSTGRES_PASSWORD: ${HUB_DB_PASSWORD:?HUB_DB_PASSWORD must be set (non-empty) in .env or environment}
      POSTGRES_DB: hub
      REDIS_HOST: hub-redis
      REDIS_PORT: 6379
      PULP_SECRET_KEY: "${PULP_SECRET_KEY:?PULP_SECRET_KEY must be set (non-empty) in .env or environment}"
      PULP_ALLOWED_HOSTS: ${PULP_ALLOWED_HOSTS:-localhost,127.0.0.1,::1,pulp-api,pulp-content}
      PULP_CONTENT_ORIGIN: ${PULP_CONTENT_ORIGIN:-http://localhost:24816}
      PULP_ANSIBLE_API_HOSTNAME: ${PULP_ANSIBLE_API_HOSTNAME:-http://localhost:5001}
      PULP_SETTINGS: /etc/pulp/settings.py
      DJANGO_SETTINGS_MODULE: pulpcore.app.settings
    volumes:
      - hub_pulp_storage:/var/lib/pulp
    networks:
      - hub-network
    depends_on:
      pulp-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "pulpcore-worker"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  galaxy-ng:
    profiles:
      - hub
    build:
      context: ./images/galaxy-ng
      args:
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-}
        VERSION: ${VERSION:-1.0.0}
    image: aax/galaxy-ng:${VERSION:-1.0.0}
    pull_policy: build
    container_name: aax-galaxy-ng
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      POSTGRES_HOST: hub-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: galaxy
      POSTGRES_PASSWORD: ${HUB_DB_PASSWORD:?HUB_DB_PASSWORD must be set (non-empty) in .env or environment}
      POSTGRES_DB: hub
      REDIS_HOST: hub-redis
      REDIS_PORT: 6379
      PULP_API_ROOT: http://pulp-api:24817
      PULP_CONTENT_ORIGIN: ${PULP_CONTENT_ORIGIN:-http://pulp-content:24816}
      PULP_ANSIBLE_API_HOSTNAME: ${PULP_ANSIBLE_API_HOSTNAME:-http://galaxy-ng:8000}
      GALAXY_ADMIN_USERNAME: ${GALAXY_ADMIN_USERNAME:-admin}
      GALAXY_ADMIN_PASSWORD: ${HUB_ADMIN_PASSWORD:?HUB_ADMIN_PASSWORD must be set (non-empty) in .env or environment}
      GALAXY_ADMIN_EMAIL: ${GALAXY_ADMIN_EMAIL:-admin@example.com}
      GALAXY_SECRET_KEY: ${GALAXY_SECRET_KEY:?GALAXY_SECRET_KEY must be set (non-empty) in .env or environment}
      GALAXY_ALLOWED_HOSTS: ${GALAXY_ALLOWED_HOSTS:-localhost,127.0.0.1,galaxy-ng,gateway}
      GALAXY_SIGNATURE_UPLOAD_ENABLED: ${GALAXY_SIGNATURE_UPLOAD_ENABLED:-false}
      GALAXY_REQUIRE_CONTENT_APPROVAL: ${GALAXY_REQUIRE_CONTENT_APPROVAL:-true}
      GALAXY_AUTO_SIGN_COLLECTIONS: ${GALAXY_AUTO_SIGN_COLLECTIONS:-false}
      GALAXY_COLLECTION_SIGNING_SERVICE: ${GALAXY_COLLECTION_SIGNING_SERVICE:-}
      GALAXY_CONTAINER_SIGNING_SERVICE: ${GALAXY_CONTAINER_SIGNING_SERVICE:-}
      DJANGO_SETTINGS_MODULE: galaxy_ng.app.settings
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      PULP_LOGGING_LEVEL: ${PULP_LOGGING_LEVEL:-INFO}
    volumes:
      - hub_pulp_storage:/var/lib/pulp
      - hub_assets:/app/static
    networks:
      - hub-network
    depends_on:
      pulp-api:
        condition: service_healthy
      pulp-content:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/galaxy/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    ports:
      - "${HOST_BIND:-127.0.0.1}:${GALAXY_PORT:-5001}:8000"

  eda-postgres:
    image: postgres:15
    container_name: eda-postgres
    profiles:
      - eda
    environment:
      POSTGRES_DB: ${EDA_DB_NAME:-eda}
      POSTGRES_USER: ${EDA_DB_USER:-eda}
      POSTGRES_PASSWORD: ${EDA_DB_PASSWORD:?EDA_DB_PASSWORD must be set (non-empty) in .env or environment}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
    volumes:
      - eda_postgres_data:/var/lib/postgresql/data
    networks:
      - eda-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  eda-redis:
    image: redis:7
    container_name: eda-redis
    command: redis-server --appendonly yes
    profiles:
      - eda
    volumes:
      - eda_redis_data:/data
    networks:
      - eda-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  eda-controller:
    build:
      context: images/eda-controller
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-1.0.0}
        BUILD_DATE: ${BUILD_DATE:-unknown}
        VCS_REF: ${VCS_REF:-unknown}
        EDA_VERSION: 1.1.3
    image: aax/eda-controller:${VERSION:-1.0.0}
    pull_policy: build
    container_name: eda-controller
    profiles:
      - eda
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      EDA_DB_HOST: eda-postgres
      EDA_DB_PORT: 5432
      EDA_DB_NAME: ${EDA_DB_NAME:-eda}
      EDA_DB_USER: ${EDA_DB_USER:-eda}
      EDA_DB_PASSWORD: ${EDA_DB_PASSWORD:?EDA_DB_PASSWORD must be set (non-empty) in .env or environment}
      EDA_REDIS_HOST: eda-redis
      EDA_REDIS_PORT: 6379
      EDA_PORT: 5000
      EDA_HOST: 0.0.0.0
      EDA_LOG_LEVEL: ${EDA_LOG_LEVEL:-INFO}
      EDA_SKIP_DB_WAIT: ${EDA_SKIP_DB_WAIT:-false}
    depends_on:
      eda-postgres:
        condition: service_healthy
      eda-redis:
        condition: service_healthy
    volumes:
      - eda_projects:/home/eda/projects
      - eda_logs:/var/log/eda
    ports:
      - "${HOST_BIND:-127.0.0.1}:${EDA_PORT:-5000}:5000"
    networks:
      - awx-network
      - eda-network
    healthcheck:
      test:
        - CMD-SHELL
        - |-
          python - <<'PY'
          import os
          import socket
          import sys
          import urllib.request

          checks = [
              (os.getenv('EDA_DB_HOST', 'eda-postgres'), int(os.getenv('EDA_DB_PORT', '5432'))),
              (os.getenv('EDA_REDIS_HOST', 'eda-redis'), int(os.getenv('EDA_REDIS_PORT', '6379'))),
          ]
          for host, port in checks:
              sock = socket.socket()
              sock.settimeout(2)
              try:
                  sock.connect((host, port))
              except Exception:
                  sys.exit(1)
              finally:
                  sock.close()

          urllib.request.urlopen(
              f"http://127.0.0.1:{os.getenv('EDA_PORT', '5000')}/health",
              timeout=2,
          )
          PY
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  ansible:
    driver: bridge
    labels:
      com.aax.description: "Network for Ansible Automation eXecution environments"
  awx-network:
    name: awx-network
    driver: bridge
  hub-network:
    driver: bridge
    labels:
      com.aax.description: "Network for Private Automation Hub services"
  eda-network:
    driver: bridge

volumes:
  workspace:
    labels:
      com.aax.description: "Shared workspace for Ansible operations"
  ee_builds:
    labels:
      com.aax.description: "Output directory for execution environment builds"
  ee_definitions:
    labels:
      com.aax.description: "Execution environment definition files"
  dev_workspace:
    labels:
      com.aax.description: "Development workspace for Ansible projects"
  awx_postgres_data:
    name: awx_postgres_data
  awx_redis_data:
    name: awx_redis_data
  awx_projects:
    name: awx_projects
  awx_rsyslog:
    name: awx_rsyslog
  receptor_data:
    name: receptor_data
  receptor_hop_data:
    name: receptor_hop_data
  receptor_execution_data:
    name: receptor_execution_data
  hub_postgres_data:
    labels:
      com.aax.description: "PostgreSQL database for Private Automation Hub"
  hub_redis_data:
    labels:
      com.aax.description: "Redis cache and message broker for Hub"
  hub_pulp_storage:
    labels:
      com.aax.description: "Pulp artifact and content storage"
  hub_assets:
    labels:
      com.aax.description: "Static assets for Galaxy NG UI"
  eda_postgres_data:
  eda_redis_data:
  eda_projects:
  eda_logs:
