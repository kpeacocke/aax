---
apiVersion: v1
kind: Secret
metadata:
  name: aax-secrets
  namespace: aax
  labels:
    app.kubernetes.io/name: aax-secrets
    app.kubernetes.io/part-of: aax
type: Opaque
stringData:
  # Replace all placeholders before deploying to non-local environments.
  POSTGRES_PASSWORD: REPLACE_WITH_STRONG_POSTGRES_PASSWORD # pragma: allowlist secret
  DATABASE_PASSWORD: REPLACE_WITH_STRONG_AWX_DATABASE_PASSWORD # pragma: allowlist secret
  AWX_ADMIN_PASSWORD: REPLACE_WITH_STRONG_AWX_ADMIN_PASSWORD # pragma: allowlist secret
  SECRET_KEY: REPLACE_WITH_64_CHAR_RANDOM_SECRET_KEY # pragma: allowlist secret
  HUB_DB_PASSWORD: REPLACE_WITH_STRONG_HUB_DB_PASSWORD # pragma: allowlist secret
  HUB_ADMIN_PASSWORD: REPLACE_WITH_STRONG_HUB_ADMIN_PASSWORD # pragma: allowlist secret
  GALAXY_SECRET_KEY: REPLACE_WITH_64_CHAR_RANDOM_GALAXY_SECRET_KEY # pragma: allowlist secret
  PULP_SECRET_KEY: CHANGE_ME_PULP_SECRET_KEY # pragma: allowlist secret
  EDA_DB_PASSWORD: REPLACE_WITH_STRONG_EDA_DB_PASSWORD # pragma: allowlist secret
