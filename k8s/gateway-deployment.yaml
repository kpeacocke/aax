---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: aax
  labels:
    app: gateway
    app.kubernetes.io/name: gateway
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: aax
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        app.kubernetes.io/name: gateway
        app.kubernetes.io/component: ingress
        app.kubernetes.io/part-of: aax
    spec:
      containers:
        - name: gateway
          image: aax/gateway:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: aax
  labels:
    app: gateway
    app.kubernetes.io/name: gateway
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: aax
spec:
  selector:
    app: gateway
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
