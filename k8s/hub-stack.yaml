---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: galaxy-ng
  namespace: aax
  labels:
    app: galaxy-ng
    app.kubernetes.io/name: galaxy-ng
    app.kubernetes.io/component: hub
    app.kubernetes.io/part-of: aax
spec:
  replicas: 1
  selector:
    matchLabels:
      app: galaxy-ng
  template:
    metadata:
      labels:
        app: galaxy-ng
        app.kubernetes.io/name: galaxy-ng
        app.kubernetes.io/component: hub
        app.kubernetes.io/part-of: aax
    spec:
      containers:
        - name: galaxy-ng
          image: aax/galaxy-ng:1.0.0
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_HOST
              value: hub-postgres
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: hub
            - name: POSTGRES_USER
              value: galaxy
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aax-secrets
                  key: HUB_DB_PASSWORD
            - name: REDIS_HOST
              value: hub-redis
            - name: REDIS_PORT
              value: "6379"
            - name: PULP_API_ROOT
              value: http://pulp-api:24817
            - name: PULP_CONTENT_ORIGIN
              value: http://pulp-content:24816
            - name: PULP_ANSIBLE_API_HOSTNAME
              value: http://galaxy-ng:8000
            - name: GALAXY_ADMIN_USERNAME
              value: admin
            - name: GALAXY_ADMIN_EMAIL
              value: admin@example.com
            - name: GALAXY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aax-secrets
                  key: HUB_ADMIN_PASSWORD
            - name: HUB_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aax-secrets
                  key: HUB_ADMIN_PASSWORD
            - name: GALAXY_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aax-secrets
                  key: GALAXY_SECRET_KEY
            - name: GALAXY_ALLOWED_HOSTS
              value: localhost,127.0.0.1,galaxy-ng,gateway
            - name: GALAXY_SIGNATURE_UPLOAD_ENABLED
              value: "false"
            - name: GALAXY_REQUIRE_CONTENT_APPROVAL
              value: "true"
            - name: GALAXY_AUTO_SIGN_COLLECTIONS
              value: "false"
            - name: DJANGO_SETTINGS_MODULE
              value: galaxy_ng.app.settings
            - name: DJANGO_DEBUG
              value: "false"
            - name: PULP_LOGGING_LEVEL
              value: INFO
          ports:
            - containerPort: 8000
              name: http
          volumeMounts:
            - name: hub-pulp-storage
              mountPath: /var/lib/pulp
            - name: hub-assets
              mountPath: /app/static
          readinessProbe:
            httpGet:
              path: /api/galaxy/
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/galaxy/
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 30
      volumes:
        - name: hub-pulp-storage
          persistentVolumeClaim:
            claimName: hub-pulp-storage
        - name: hub-assets
          persistentVolumeClaim:
            claimName: hub-assets
---
apiVersion: v1
kind: Service
metadata:
  name: galaxy-ng
  namespace: aax
spec:
  selector:
    app: galaxy-ng
  ports:
    - name: http
      port: 8000
      targetPort: 8000
